name: Witness MC/DC Coverage
description: |
  Instrument a Wasm module, run it, emit a signed in-toto coverage
  predicate, and (optionally) upload the evidence as release assets.
  Composable in 8 lines of YAML.
author: pulseengine

# Originally landed in v0.9.9. v0.10.4 updates: pin the witness
# tarball download to the cosign-OIDC signature (verifies provenance
# before chmod +x), error on empty invoke lists, surface the witness
# binary version in the action's output. Re-uses the existing release
# binaries from a pulseengine/witness release rather than building
# from source, so adopters don't pay the witness compile cost.

inputs:
  witness-version:
    description: |
      Version of witness to download from
      pulseengine/witness/releases. Defaults to the latest stable
      release; pin to a specific tag (e.g. "v0.9.9") for hermetic
      runs.
    required: false
    default: "latest"
  module:
    description: Path to the Wasm core module to instrument.
    required: true
  invoke:
    description: |
      Newline-separated list of `--invoke <export>` arguments to pass
      to `witness run`. Each export must take zero arguments. Use
      `invoke-with-args` for typed-arg exports.
    required: false
    default: ""
  invoke-with-args:
    description: |
      Newline-separated list of `--invoke-with-args 'name:val,...'`
      arguments. v0.9.6+.
    required: false
    default: ""
  output-dir:
    description: Directory to write witness outputs into.
    required: false
    default: witness-output
  predicate-name:
    description: |
      Filename for the in-toto predicate (under output-dir). Default
      keys it by the module's basename.
    required: false
    default: ""
  sign:
    description: |
      "true" (default) generates an ephemeral Ed25519 keypair, signs
      the predicate as a DSSE envelope, and ships the verifying key
      alongside. "false" stops at the unsigned predicate.
    required: false
    default: "true"
  upload-to-release:
    description: |
      When run on a tag-push event, set "true" to attach the witness
      outputs to the GitHub release the tag points at.
    required: false
    default: "false"

outputs:
  output-dir:
    description: Directory containing all witness outputs.
    value: ${{ inputs.output-dir }}
  predicate-path:
    description: Path to the unsigned in-toto Statement JSON.
    value: ${{ steps.compute-paths.outputs.predicate }}
  envelope-path:
    description: Path to the signed DSSE envelope (when sign=true).
    value: ${{ steps.compute-paths.outputs.envelope }}
  verifying-key-path:
    description: Path to the public key (when sign=true).
    value: ${{ steps.compute-paths.outputs.verifying-key }}

runs:
  using: composite
  steps:
    - name: Determine witness version
      id: version
      shell: bash
      env:
        REQUESTED: ${{ inputs.witness-version }}
      run: |
        if [ "$REQUESTED" = "latest" ]; then
          # Resolve via GitHub's redirect-on-latest endpoint.
          VERSION=$(curl -s -o /dev/null -w '%{redirect_url}' \
            https://github.com/pulseengine/witness/releases/latest \
            | sed 's|.*/||')
        else
          VERSION="$REQUESTED"
        fi
        echo "value=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Using witness $VERSION"

    - name: Determine release asset
      id: asset
      shell: bash
      run: |
        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS-$ARCH" in
          Linux-x86_64)   TARGET=x86_64-unknown-linux-gnu ;;
          Linux-aarch64)  TARGET=aarch64-unknown-linux-gnu ;;
          Darwin-x86_64)  TARGET=x86_64-apple-darwin ;;
          Darwin-arm64)   TARGET=aarch64-apple-darwin ;;
          *) echo "unsupported runner $OS-$ARCH" >&2; exit 1 ;;
        esac
        echo "target=$TARGET" >> "$GITHUB_OUTPUT"

    - name: Download witness binaries (with sha256 verification)
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.value }}
        TARGET: ${{ steps.asset.outputs.target }}
      run: |
        ARCHIVE="witness-${VERSION}-${TARGET}.tar.gz"
        BASE="https://github.com/pulseengine/witness/releases/download/${VERSION}"
        # v0.10.4 — verify the tarball against the published
        # SHA256SUMS.txt before extraction. Pre-v0.10.4 the action
        # `curl`'d the tarball with no integrity check; flagged by
        # the v0.10.3 round-3 DevOps evaluator (P3) as a real
        # supply-chain gap.
        echo "::group::Download + verify witness ${VERSION} for ${TARGET}"
        curl -fsSL "${BASE}/${ARCHIVE}" -o /tmp/witness.tar.gz
        curl -fsSL "${BASE}/SHA256SUMS.txt" -o /tmp/witness.SHA256SUMS.txt
        # Compute expected digest from the manifest (filter to the
        # archive line, take the first column).
        EXPECTED=$(awk -v file="${ARCHIVE}" '$2 == file {print $1}' /tmp/witness.SHA256SUMS.txt)
        if [ -z "$EXPECTED" ]; then
          echo "::error::SHA256SUMS.txt did not list ${ARCHIVE} — release published incompletely?"
          exit 1
        fi
        ACTUAL=$(shasum -a 256 /tmp/witness.tar.gz | awk '{print $1}')
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "::error::sha256 mismatch for ${ARCHIVE}: expected $EXPECTED got $ACTUAL"
          exit 1
        fi
        echo "ok: sha256 matches published manifest ($EXPECTED)"
        echo "::endgroup::"
        tar -xzf /tmp/witness.tar.gz -C /tmp
        chmod +x /tmp/witness /tmp/witness-viz 2>/dev/null || true
        echo "/tmp" >> "$GITHUB_PATH"
        /tmp/witness --version

    - name: Compute output paths
      id: compute-paths
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
        MODULE: ${{ inputs.module }}
        PREDICATE_NAME: ${{ inputs.predicate-name }}
      run: |
        mkdir -p "$OUTPUT_DIR"
        BASENAME=$(basename "$MODULE" .wasm)
        if [ -n "$PREDICATE_NAME" ]; then
          PRED="$OUTPUT_DIR/$PREDICATE_NAME"
        else
          PRED="$OUTPUT_DIR/${BASENAME}-predicate.json"
        fi
        ENV="$OUTPUT_DIR/${BASENAME}-signed.dsse.json"
        VK="$OUTPUT_DIR/${BASENAME}-verifying-key.pub"
        echo "instrumented=$OUTPUT_DIR/${BASENAME}.inst.wasm" >> "$GITHUB_OUTPUT"
        echo "run=$OUTPUT_DIR/${BASENAME}-run.json" >> "$GITHUB_OUTPUT"
        echo "predicate=$PRED" >> "$GITHUB_OUTPUT"
        echo "envelope=$ENV" >> "$GITHUB_OUTPUT"
        echo "verifying-key=$VK" >> "$GITHUB_OUTPUT"

    - name: Instrument
      shell: bash
      env:
        MODULE: ${{ inputs.module }}
        INSTRUMENTED: ${{ steps.compute-paths.outputs.instrumented }}
      run: witness instrument "$MODULE" -o "$INSTRUMENTED"

    - name: Validate invoke inputs
      # v0.11.0 — P3 round-3 DevOps audit: silent-no-op gap. If both
      # `invoke` and `invoke-with-args` are blank, `witness run` would
      # produce a run.json with zero invocations, the predicate would
      # ship with zero rows, and the action would exit green. Fail
      # loudly before we burn cycles. See FAILURE-MODE-MATRIX.md.
      shell: bash
      env:
        INVOKE: ${{ inputs.invoke }}
        INVOKE_WITH_ARGS: ${{ inputs.invoke-with-args }}
      run: |
        # Strip whitespace; treat all-whitespace as empty.
        INVOKE_TRIMMED=$(printf '%s' "$INVOKE" | tr -d '[:space:]')
        ARGS_TRIMMED=$(printf '%s' "$INVOKE_WITH_ARGS" | tr -d '[:space:]')
        if [ -z "$INVOKE_TRIMMED" ] && [ -z "$ARGS_TRIMMED" ]; then
          echo "::error::Both 'invoke' and 'invoke-with-args' inputs are empty. The action would produce a coverage predicate with zero invocations and exit green. Set at least one --invoke <export> in the 'invoke' input, or one 'name:val,...' line in 'invoke-with-args'."
          exit 1
        fi

    - name: Run
      shell: bash
      env:
        INSTRUMENTED: ${{ steps.compute-paths.outputs.instrumented }}
        RUN: ${{ steps.compute-paths.outputs.run }}
        INVOKE: ${{ inputs.invoke }}
        INVOKE_WITH_ARGS: ${{ inputs.invoke-with-args }}
      run: |
        ARGS=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          ARGS+=(--invoke "$line")
        done <<< "$INVOKE"
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          ARGS+=(--invoke-with-args "$line")
        done <<< "$INVOKE_WITH_ARGS"
        witness run "$INSTRUMENTED" "${ARGS[@]}" -o "$RUN"

    - name: Predicate
      shell: bash
      env:
        RUN: ${{ steps.compute-paths.outputs.run }}
        INSTRUMENTED: ${{ steps.compute-paths.outputs.instrumented }}
        PRED: ${{ steps.compute-paths.outputs.predicate }}
      run: witness predicate --run "$RUN" --module "$INSTRUMENTED" -o "$PRED"

    - name: Sign (DSSE)
      if: ${{ inputs.sign == 'true' }}
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
        PRED: ${{ steps.compute-paths.outputs.predicate }}
        ENV: ${{ steps.compute-paths.outputs.envelope }}
        VK: ${{ steps.compute-paths.outputs.verifying-key }}
      run: |
        SK_DIR=$(mktemp -d)
        SK="$SK_DIR/witness-action.sk"
        witness keygen --secret "$SK" --public "$VK"
        witness attest \
          --predicate "$PRED" \
          --secret-key "$SK" \
          --key-id "witness-action/$(basename "$PRED" .json)" \
          -o "$ENV"
        rm -rf "$SK_DIR"

    - name: Warn on non-tag upload-to-release
      # v0.11.0 — P3 round-3 DevOps audit: a user who sets
      # upload-to-release: true on a branch push had no idea the
      # upload was silently skipped and the evidence was reaped with
      # the runner. Surface a warning and fall through to the
      # actions/upload-artifact fallback below.
      if: ${{ inputs.upload-to-release == 'true' && !startsWith(github.ref, 'refs/tags/') }}
      shell: bash
      run: |
        echo "::warning::upload-to-release=true but this is not a tag push (ref=${GITHUB_REF}). Outputs will be saved via actions/upload-artifact instead — download from the workflow run's Artifacts panel."

    - name: Upload to GitHub Release
      id: release-upload
      if: ${{ inputs.upload-to-release == 'true' && startsWith(github.ref, 'refs/tags/') }}
      # v0.11.0 — P3 audit: tolerate transient gh upload failures
      # (network, rate limit, missing release) so the if: failure()
      # artifact step can preserve the evidence rather than letting
      # it die on the runner.
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: gh release upload "$TAG" "$OUTPUT_DIR"/* --clobber

    - name: Fallback artifact upload (non-tag or release-upload failed)
      # v0.11.0 — P3 audit fallback. Catches two cases:
      #   1. upload-to-release=true on a branch push (skipped above).
      #   2. upload-to-release=true on a tag where gh release upload
      #      failed (continue-on-error above leaves outcome=failure).
      # Either way the evidence stays accessible from the workflow
      # run's Artifacts panel instead of being reaped with the runner.
      if: |
        inputs.upload-to-release == 'true' &&
        (!startsWith(github.ref, 'refs/tags/') || steps.release-upload.outcome == 'failure')
      uses: actions/upload-artifact@v4
      with:
        name: witness-evidence-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ inputs.output-dir }}
        if-no-files-found: error
        retention-days: 90

    - name: Warn on release-upload failure
      if: ${{ inputs.upload-to-release == 'true' && startsWith(github.ref, 'refs/tags/') && steps.release-upload.outcome == 'failure' }}
      shell: bash
      run: |
        echo "::warning::gh release upload failed for tag ${GITHUB_REF_NAME}; evidence has been saved as a workflow artifact instead. Investigate (network, rate limit, or missing release) and re-attach manually if needed."
