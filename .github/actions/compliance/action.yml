name: Witness Compliance Evidence
description: Generate the release-time compliance evidence bundle from a witness run record.

inputs:
  report-label:
    description: Display label for the bundle (defaults to git tag).
    required: false
    default: ""
  run-json:
    description: Path to witness run JSON.
    required: false
    default: ""
  modules:
    description: JSON array of {original, instrumented, harness}.
    required: false
    default: "[]"
  output:
    description: Output directory for evidence files.
    required: false
    default: compliance
  archive:
    description: Whether to create a .tar.gz archive.
    required: false
    default: "true"
  archive-name:
    description: Archive filename without extension.
    required: false
    default: ""

outputs:
  report-dir:
    description: Path to evidence directory.
    value: ${{ steps.export.outputs.report-dir }}
  archive-path:
    description: Path to tar.gz archive (when archive=true).
    value: ${{ steps.archive.outputs.archive-path }}

runs:
  using: composite
  steps:
    - name: Build witness
      shell: bash
      run: |
        cargo build --release
        echo "$PWD/target/release" >> "$GITHUB_PATH"

    - name: Determine report label
      id: label
      shell: bash
      env:
        INPUT_LABEL: ${{ inputs.report-label }}
      run: |
        LABEL="$INPUT_LABEL"
        if [ -z "$LABEL" ]; then
          LABEL="${GITHUB_REF#refs/tags/}"
          [ "$LABEL" = "$GITHUB_REF" ] && LABEL="dev"
        fi
        echo "value=${LABEL}" >> "$GITHUB_OUTPUT"

    - name: Initialise evidence dir
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
      run: |
        mkdir -p "$OUTPUT_DIR/predicates" "$OUTPUT_DIR/manifests"

    - name: Generate coverage report
      if: ${{ inputs.run-json != '' }}
      shell: bash
      env:
        RUN_JSON: ${{ inputs.run-json }}
        OUTPUT_DIR: ${{ inputs.output }}
      run: |
        set -euo pipefail
        witness report --input "$RUN_JSON" --format json > "$OUTPUT_DIR/coverage-report.json"
        witness report --input "$RUN_JSON" --format text > "$OUTPUT_DIR/coverage-report.txt"

    - name: Bundle manifests
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
      run: |
        find . -name "*.witness.json" -not -path "*/target/*" -type f \
          -exec cp {} "$OUTPUT_DIR/manifests/" \; 2>/dev/null || true

    - name: Run verdict suite (v0.6.3+)
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
      run: |
        set -euo pipefail
        # Need wasm32-unknown-unknown to build the verdict crates as
        # core modules (wasm32-wasip2 produces Components which walrus
        # can't currently rewrite).
        rustup target add wasm32-unknown-unknown
        if [ -x verdicts/run-suite.sh ]; then
          ./verdicts/run-suite.sh "$OUTPUT_DIR/verdict-evidence" || true
        else
          echo "warn: verdicts/run-suite.sh missing; skipping verdict bundle" >&2
        fi

    - name: Generate suite index HTML (v0.8.2+)
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
      run: |
        set -euo pipefail
        if [ -f .github/actions/compliance/suite-index.py ] \
           && [ -d "$OUTPUT_DIR/verdict-evidence" ]; then
          python3 .github/actions/compliance/suite-index.py \
            "$OUTPUT_DIR/verdict-evidence" \
            "$OUTPUT_DIR/verdict-evidence/suite-index.html" || true
        fi

    - name: Generate V-model traceability matrix (v0.6.5+)
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
      run: |
        set -euo pipefail
        if [ -f .github/actions/compliance/trace-matrix.py ]; then
          # PyYAML is the only Python dep. Ubuntu runners have it via
          # `apt install python3-yaml`; fall back to pip with the
          # break-system-packages flag if that's missing.
          python3 -c 'import yaml' 2>/dev/null \
            || pip3 install --break-system-packages --user pyyaml --quiet \
            || sudo apt-get install -y python3-yaml
          python3 .github/actions/compliance/trace-matrix.py \
            artifacts "$OUTPUT_DIR/verdict-evidence" "$OUTPUT_DIR" || true
        fi

    - name: Self-verify compliance bundle (v0.6.8+)
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
      run: |
        set -euo pipefail
        # Defense in depth: every release proves the verify path works
        # against the bundle it just built. If signing was skipped or
        # the verify command regresses, this step fails the release.
        VK="$OUTPUT_DIR/verdict-evidence/verifying-key.pub"
        if [ ! -f "$VK" ]; then
          echo "verifying-key.pub missing — verdict suite did not sign; skipping self-verify"
          exit 0
        fi
        # Pick a verdict with a non-empty signed envelope. leap_year is
        # the canonical demo and consistently produces one; fall back to
        # any other if leap_year is absent.
        ENV=""
        for candidate in leap_year triangle state_guard safety_envelope parser_dispatch; do
          if [ -f "$OUTPUT_DIR/verdict-evidence/$candidate/signed.dsse.json" ]; then
            ENV="$OUTPUT_DIR/verdict-evidence/$candidate/signed.dsse.json"
            break
          fi
        done
        if [ -z "$ENV" ]; then
          echo "no signed.dsse.json found in any verdict; skipping self-verify"
          exit 0
        fi
        echo "self-verifying $ENV"
        witness verify --envelope "$ENV" --public-key "$VK"

    - name: Write README
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
        LABEL: ${{ steps.label.outputs.value }}
      run: |
        cat > "$OUTPUT_DIR/README.txt" <<EOF
        Witness Compliance Evidence Bundle - ${LABEL}
        Generated by .github/actions/compliance.

        Contents:
          coverage-report.json   - machine-readable coverage data (when present)
          coverage-report.txt    - human-readable summary (when present)
          predicates/            - in-toto Statements (unsigned, ready for sigil)
          manifests/             - branch manifests (.witness.json)
          verdict-evidence/      - per-verdict end-to-end evidence (v0.6.3+):
            suite-index.html             scoreboard + drill-down (v0.8.2+)
            <name>/source.wasm           pre-instrumentation Wasm
            <name>/instrumented.wasm     post-instrumentation Wasm
            <name>/manifest.json         branches + reconstructed decisions
            <name>/run.json              per-row condition vectors (v3 schema)
            <name>/report.txt            MC/DC truth tables + verdicts (text)
            <name>/report.json           MC/DC report (JSON, schema v1)
            <name>/predicate.json        in-toto Statement (unsigned)
            <name>/signed.dsse.json      DSSE-signed envelope (v0.6.4+)
            <name>/lcov.info, overview.txt  LCOV (when DWARF surfaces)
          verifying-key.pub      - Ed25519 public key (v0.6.4+) — verify with witness verify
          VERIFY.md              - verification walkthrough (v0.6.4+)
          SUMMARY.txt            - one-line-per-verdict status table
          traceability-matrix.json   - V-model matrix (v0.6.5+, schema /witness-trace-matrix/v1)
          traceability-matrix.html   - V-model matrix (rendered)

        Schemas:
          https://pulseengine.eu/witness-coverage/v1            (predicate)
          https://pulseengine.eu/witness-rivet-evidence/v1     (rivet evidence)
          https://pulseengine.eu/witness-mcdc/v1               (MC/DC report)
          https://pulseengine.eu/witness-trace-matrix/v1       (V-model matrix)
        EOF

    - name: Create archive
      id: archive
      if: ${{ inputs.archive == 'true' }}
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
        LABEL: ${{ steps.label.outputs.value }}
        ARCHIVE_NAME: ${{ inputs.archive-name }}
      run: |
        set -euo pipefail
        NAME="${ARCHIVE_NAME}"
        [ -z "$NAME" ] && NAME="witness-${LABEL}-compliance-evidence"
        tar -czf "${NAME}.tar.gz" -C "$(dirname "$OUTPUT_DIR")" "$(basename "$OUTPUT_DIR")"
        echo "archive-path=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

    - name: Export report dir
      id: export
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
      run: echo "report-dir=${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"
