name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build witness (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build witness (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # v0.9.4 — witness-viz lives in its own standalone workspace at
      # crates/witness-viz (DEC-026). Build it for the same target so
      # release tarballs ship both binaries; otherwise `witness viz`
      # subcommand has no binary to spawn.
      - name: Build witness-viz (native)
        if: ${{ !matrix.cross }}
        working-directory: crates/witness-viz
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build witness-viz (cross)
        if: matrix.cross
        working-directory: crates/witness-viz
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          strip "target/${{ matrix.target }}/release/witness" 2>/dev/null || true
          strip "crates/witness-viz/target/${{ matrix.target }}/release/witness-viz" 2>/dev/null || true

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="witness-${VERSION}-${TARGET}.tar.gz"
          mkdir -p staging
          cp "target/${TARGET}/release/witness" staging/
          cp "crates/witness-viz/target/${TARGET}/release/witness-viz" staging/
          cp README.md LICENSE-APACHE LICENSE-MIT staging/ 2>/dev/null || true
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="witness-${VERSION}-${TARGET}.zip"
          mkdir -p staging
          cp "target/${TARGET}/release/witness.exe" staging/
          cp "crates/witness-viz/target/${TARGET}/release/witness-viz.exe" staging/
          cp README.md LICENSE-APACHE LICENSE-MIT staging/ 2>/dev/null || true
          cd staging && 7z a "../$ARCHIVE" . && cd ..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  compliance:
    name: Generate compliance evidence
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/compliance
        id: evidence
        with:
          report-label: ${{ github.ref_name }}
          run-json: ""
          modules: "[]"
      - uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: ${{ steps.evidence.outputs.archive-path }}

  wasm-component:
    name: Build witness-component (real Component Model wasm) — v0.7.0+
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-wasm32-wasip2

      - name: Build witness-component for wasm32-wasip2
        # witness-component is its own standalone workspace (see
        # crates/witness-component/Cargo.toml) so the parent workspace
        # can build host-only without dragging wit-bindgen FFI symbols
        # into the host linker.
        working-directory: crates/witness-component
        run: cargo build --release --target wasm32-wasip2

      - name: Stage wasm asset
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # v0.9.9 rename: was `witness-component-...wasm` which
          # confused users (per tester review) into thinking they
          # could feed it to `witness instrument`. It's actually the
          # WASI 0.2.9 *reporter* component — used by sigil/loom
          # plumbing tests, not as a witness instrument target.
          ASSET="witness-reporter-component-${VERSION}-wasm32-wasip2.wasm"
          cp crates/witness-component/target/wasm32-wasip2/release/witness_component.wasm "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "::notice::witness-reporter-component built ($(wc -c < $ASSET) bytes); WASI 0.2.9 reporter component, NOT an instrumentable target — see release notes"

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-component
          path: ${{ env.ASSET }}

  create-github-release:
    name: Create GitHub Release
    needs: [build-binaries, compliance, wasm-component]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.wasm" \) -exec cp {} release-assets/ \;
          cd release-assets && sha256sum * > SHA256SUMS.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          gh release create "$VERSION" \
            --title "witness $VERSION" \
            --generate-notes \
            release-assets/*
