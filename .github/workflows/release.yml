name: Release

# Release variant: serialise per-tag (release-${{ github.ref }}) and
# never cancel a run mid-publish. A cancelled release leaves
# registries, attestations, or signed artifacts in an inconsistent
# state — better to queue than abort.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # v0.10.0 — keyless cosign signing via GitHub OIDC. The build job
  # exchanges a short-lived id-token for a Fulcio code-signing
  # certificate bound to this workflow's identity, signs each release
  # asset, and attaches the .sig + .cert pair next to the asset on
  # the GitHub Release. No long-term key custody.
  id-token: write

env:
  CARGO_TERM_COLOR: always

# v0.10.0 introduced a workflow-level SOURCE_DATE_EPOCH expression
# that was *inverted* — `${{ A && '' || B }}` evaluates to `''` when
# A is truthy, so when a head_commit existed (always, on tag push)
# the var was set to an empty string and predicate.rs's wall-clock
# fallback kicked in. Worse, `head_commit.timestamp` is an ISO-8601
# string, not the Unix-epoch integer SOURCE_DATE_EPOCH expects.
#
# Caught by the v0.10.3 round-3 security evaluator (P5). v0.10.4
# fix: compute the epoch from the tag commit at workflow time and
# export it via $GITHUB_ENV in a per-job step (see "Set
# SOURCE_DATE_EPOCH" below). End-user reproducibility (the actual
# claim in the README) is unaffected — predicate.rs honours
# SOURCE_DATE_EPOCH whenever it's set in the runtime env.

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build witness (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build witness (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # v0.9.4 — witness-viz lives in its own standalone workspace at
      # crates/witness-viz (DEC-026). Build it for the same target so
      # release tarballs ship both binaries; otherwise `witness viz`
      # subcommand has no binary to spawn.
      - name: Build witness-viz (native)
        if: ${{ !matrix.cross }}
        working-directory: crates/witness-viz
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build witness-viz (cross)
        if: matrix.cross
        working-directory: crates/witness-viz
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          strip "target/${{ matrix.target }}/release/witness" 2>/dev/null || true
          strip "crates/witness-viz/target/${{ matrix.target }}/release/witness-viz" 2>/dev/null || true

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="witness-${VERSION}-${TARGET}.tar.gz"
          mkdir -p staging
          cp "target/${TARGET}/release/witness" staging/
          cp "crates/witness-viz/target/${TARGET}/release/witness-viz" staging/
          cp README.md LICENSE-APACHE LICENSE-MIT staging/ 2>/dev/null || true
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="witness-${VERSION}-${TARGET}.zip"
          mkdir -p staging
          cp "target/${TARGET}/release/witness.exe" staging/
          cp "crates/witness-viz/target/${TARGET}/release/witness-viz.exe" staging/
          cp README.md LICENSE-APACHE LICENSE-MIT staging/ 2>/dev/null || true
          cd staging && 7z a "../$ARCHIVE" . && cd ..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  compliance:
    name: Generate compliance evidence
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Need the tag's commit, not the merge ref, so the timestamp
          # is the user-visible commit timestamp.
          ref: ${{ github.ref }}
      # v0.10.4 — set SOURCE_DATE_EPOCH from the tag commit's Unix
      # timestamp so every reproducible rebuild of the same tag
      # produces byte-identical predicate envelopes. predicate.rs
      # honours this variable when set; falls back to wall-clock
      # otherwise.
      - name: Set SOURCE_DATE_EPOCH from tag commit
        run: |
          EPOCH=$(git log -1 --pretty=%ct "${GITHUB_SHA}")
          echo "SOURCE_DATE_EPOCH=${EPOCH}" >> "$GITHUB_ENV"
          echo "::notice::Reproducible-build clock SOURCE_DATE_EPOCH=${EPOCH} (tag commit)"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/compliance
        id: evidence
        with:
          report-label: ${{ github.ref_name }}
          run-json: ""
          modules: "[]"
      - uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: ${{ steps.evidence.outputs.archive-path }}

  wasm-component:
    name: Build witness-component (real Component Model wasm) — v0.7.0+
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-wasm32-wasip2

      - name: Build witness-component for wasm32-wasip2
        # witness-component is its own standalone workspace (see
        # crates/witness-component/Cargo.toml) so the parent workspace
        # can build host-only without dragging wit-bindgen FFI symbols
        # into the host linker.
        working-directory: crates/witness-component
        run: cargo build --release --target wasm32-wasip2

      - name: Stage wasm asset
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # v0.9.9 rename: was `witness-component-...wasm` which
          # confused users (per tester review) into thinking they
          # could feed it to `witness instrument`. It's actually the
          # WASI 0.2.9 *reporter* component — used by sigil/loom
          # plumbing tests, not as a witness instrument target.
          ASSET="witness-reporter-component-${VERSION}-wasm32-wasip2.wasm"
          cp crates/witness-component/target/wasm32-wasip2/release/witness_component.wasm "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "::notice::witness-reporter-component built ($(wc -c < $ASSET) bytes); WASI 0.2.9 reporter component, NOT an instrumentable target — see release notes"

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-component
          path: ${{ env.ASSET }}

  create-github-release:
    name: Create GitHub Release
    needs: [build-binaries, compliance, wasm-component]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for keyless cosign signing via Fulcio.
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.wasm" \) -exec cp {} release-assets/ \;
          cd release-assets && sha256sum * > SHA256SUMS.txt

      # v0.10.0 — keyless cosign signing. Each asset gets a `.sig`
      # (the signature) and `.cert` (the Fulcio code-signing certificate
      # tying the signature to this workflow's OIDC identity). Verify
      # downstream with:
      #   cosign verify-blob \
      #     --certificate-identity 'https://github.com/pulseengine/witness/.github/workflows/release.yml@refs/tags/<TAG>' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      #     --signature <asset>.sig --certificate <asset>.cert <asset>
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign release assets (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd release-assets
          for asset in *; do
            # Skip already-generated signatures/certs from a previous loop
            case "$asset" in *.sig|*.cert) continue ;; esac
            cosign sign-blob --yes \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.cert" \
              "$asset"
          done
          ls -la *.sig *.cert | head -20

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          gh release create "$VERSION" \
            --title "witness $VERSION" \
            --generate-notes \
            release-assets/*
