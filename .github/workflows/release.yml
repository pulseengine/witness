name: Release

# Release variant: serialise per-tag (release-${{ github.ref }}) and
# never cancel a run mid-publish. A cancelled release leaves
# registries, attestations, or signed artifacts in an inconsistent
# state — better to queue than abort.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # v0.10.0 — keyless cosign signing via GitHub OIDC. The build job
  # exchanges a short-lived id-token for a Fulcio code-signing
  # certificate bound to this workflow's identity, signs each release
  # asset, and attaches the .sig + .cert pair next to the asset on
  # the GitHub Release. No long-term key custody.
  id-token: write
  # Needed by actions/attest-build-provenance@v2 (SLSA v1
  # provenance) in the create-github-release job. Per the org-wide
  # release-artifact standardization brief.
  attestations: write
  # v0.23.0 — needed by the `publish-pages` job below to push the
  # static MC/DC viz dashboard for the release's canonical verdict
  # set to GitHub Pages via actions/deploy-pages. Repo setting
  # "Pages → Source" must be "GitHub Actions" (not "Branch") for
  # this to take effect; manual one-time setup on the repo.
  pages: write

env:
  CARGO_TERM_COLOR: always

# v0.10.0 introduced a workflow-level SOURCE_DATE_EPOCH expression
# that was *inverted* — `${{ A && '' || B }}` evaluates to `''` when
# A is truthy, so when a head_commit existed (always, on tag push)
# the var was set to an empty string and predicate.rs's wall-clock
# fallback kicked in. Worse, `head_commit.timestamp` is an ISO-8601
# string, not the Unix-epoch integer SOURCE_DATE_EPOCH expects.
#
# Caught by the v0.10.3 round-3 security evaluator (P5). v0.10.4
# fix: compute the epoch from the tag commit at workflow time and
# export it via $GITHUB_ENV in a per-job step (see "Set
# SOURCE_DATE_EPOCH" below). End-user reproducibility (the actual
# claim in the README) is unaffected — predicate.rs honours
# SOURCE_DATE_EPOCH whenever it's set in the runtime env.

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build witness (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build witness (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # v0.9.4 — witness-viz lives in its own standalone workspace at
      # crates/witness-viz (DEC-026). Build it for the same target so
      # release tarballs ship both binaries; otherwise `witness viz`
      # subcommand has no binary to spawn.
      - name: Build witness-viz (native)
        if: ${{ !matrix.cross }}
        working-directory: crates/witness-viz
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build witness-viz (cross)
        if: matrix.cross
        working-directory: crates/witness-viz
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          strip "target/${{ matrix.target }}/release/witness" 2>/dev/null || true
          strip "crates/witness-viz/target/${{ matrix.target }}/release/witness-viz" 2>/dev/null || true

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="witness-${VERSION}-${TARGET}.tar.gz"
          mkdir -p staging
          cp "target/${TARGET}/release/witness" staging/
          cp "crates/witness-viz/target/${TARGET}/release/witness-viz" staging/
          cp README.md LICENSE-APACHE LICENSE-MIT staging/ 2>/dev/null || true
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="witness-${VERSION}-${TARGET}.zip"
          mkdir -p staging
          cp "target/${TARGET}/release/witness.exe" staging/
          cp "crates/witness-viz/target/${TARGET}/release/witness-viz.exe" staging/
          cp README.md LICENSE-APACHE LICENSE-MIT staging/ 2>/dev/null || true
          cd staging && 7z a "../$ARCHIVE" . && cd ..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  compliance:
    name: Generate compliance evidence
    needs: [build-binaries]
    runs-on: ubuntu-latest
    # v0.15.1 — id-token: write needed for the keyless rekor
    # attest-blob step that runs after the compliance bundle is
    # built. Inherits from the workflow-level grant; declared here
    # for clarity.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Need the tag's commit, not the merge ref, so the timestamp
          # is the user-visible commit timestamp.
          ref: ${{ github.ref }}
      # v0.10.4 — set SOURCE_DATE_EPOCH from the tag commit's Unix
      # timestamp so every reproducible rebuild of the same tag
      # produces byte-identical predicate envelopes. predicate.rs
      # honours this variable when set; falls back to wall-clock
      # otherwise.
      - name: Set SOURCE_DATE_EPOCH from tag commit
        run: |
          EPOCH=$(git log -1 --pretty=%ct "${GITHUB_SHA}")
          echo "SOURCE_DATE_EPOCH=${EPOCH}" >> "$GITHUB_ENV"
          echo "::notice::Reproducible-build clock SOURCE_DATE_EPOCH=${EPOCH} (tag commit)"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/compliance
        id: evidence
        with:
          report-label: ${{ github.ref_name }}
          run-json: ""
          modules: "[]"

      # v0.15.1 — rekor bolt-on. Log every predicate.json in the
      # compliance bundle to Sigstore Rekor via keyless `cosign
      # attest-blob`. Each predicate gets a `.rekor.bundle`
      # alongside it in the bundle so downstream verifiers can
      # reproduce the proof without re-contacting the public
      # transparency log. The bundle's existing Ed25519 DSSE
      # signatures stay — Rekor adds a second, independent
      # binding-proof layer.
      #
      # Verify downstream (any predicate in the bundle):
      #   cosign verify-blob \
      #     --certificate-identity 'https://github.com/pulseengine/witness/.github/workflows/release.yml@refs/tags/<TAG>' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      #     --bundle <name>/predicate.rekor.bundle \
      #     <name>/predicate.json
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'
      - name: Rekor-log every predicate.json via keyless cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          # The compliance Action writes per-verdict predicate.json
          # files under compliance/verdict-evidence/<name>/. Sign each
          # with keyless `cosign sign-blob`; with COSIGN_EXPERIMENTAL=1,
          # cosign uploads the entry to Sigstore Rekor automatically.
          # Output files (.cosign.sig + .cosign.cert) get re-bundled
          # below so the compliance archive carries them for offline
          # verification.
          shopt -s nullglob
          COUNT=0
          for predicate in compliance/verdict-evidence/*/predicate.json; do
            COUNT=$((COUNT + 1))
            cosign sign-blob --yes \
              --output-signature "${predicate%.json}.cosign.sig" \
              --output-certificate "${predicate%.json}.cosign.cert" \
              "$predicate"
          done
          echo "::notice::Rekor-logged $COUNT witness predicate envelope(s) via keyless cosign sign-blob"
          # Re-archive: the compliance Action already produced
          # compliance/<archive>.tar.gz but the .cosign.sig /
          # .cosign.cert files we just emitted aren't in it yet.
          # Regenerate the archive in-place so the uploaded artifact
          # carries them.
          if [ -d compliance ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            ARCHIVE_NAME="witness-${VERSION}-compliance-evidence.tar.gz"
            (cd compliance && tar -czf "../${ARCHIVE_NAME}" .)
            echo "REPACKED_ARCHIVE=${PWD}/${ARCHIVE_NAME}" >> "$GITHUB_ENV"
            ls -la "${ARCHIVE_NAME}"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: compliance-evidence
          path: ${{ env.REPACKED_ARCHIVE || steps.evidence.outputs.archive-path }}

  wasm-component:
    name: Build witness-component (real Component Model wasm) — v0.7.0+
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-wasm32-wasip2

      - name: Build witness-component for wasm32-wasip2
        # witness-component is its own standalone workspace (see
        # crates/witness-component/Cargo.toml) so the parent workspace
        # can build host-only without dragging wit-bindgen FFI symbols
        # into the host linker.
        working-directory: crates/witness-component
        run: cargo build --release --target wasm32-wasip2

      - name: Stage wasm asset
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # v0.9.9 rename: was `witness-component-...wasm` which
          # confused users (per tester review) into thinking they
          # could feed it to `witness instrument`. It's actually the
          # WASI 0.2.9 *reporter* component — used by sigil/loom
          # plumbing tests, not as a witness instrument target.
          ASSET="witness-reporter-component-${VERSION}-wasm32-wasip2.wasm"
          cp crates/witness-component/target/wasm32-wasip2/release/witness_component.wasm "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "::notice::witness-reporter-component built ($(wc -c < $ASSET) bytes); WASI 0.2.9 reporter component, NOT an instrumentable target — see release notes"

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-component
          path: ${{ env.ASSET }}

  create-github-release:
    name: Create GitHub Release
    needs: [build-binaries, compliance, wasm-component]
    runs-on: ubuntu-latest
    # Permissions — three of them, per the org-wide release-artifact
    # standardization brief:
    #   contents: write       — needed to create the GitHub Release
    #                           and upload assets.
    #   id-token: write       — needed for keyless cosign signing via
    #                           Fulcio (sigstore OIDC).
    #   attestations: write   — needed for actions/attest-build-provenance,
    #                           which writes a SLSA v1 provenance
    #                           attestation against each binary tarball.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.wasm" \) -exec cp {} release-assets/ \;

      # SBOM step. Must run BEFORE the SHA256SUMS.txt step below so
      # the SBOM's own digest enters the sums. CycloneDX 1.5 JSON is
      # the format the org-wide release-artifact standardization
      # brief settles on.
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM (CycloneDX 1.5)
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          BARE="${VERSION#v}"
          cargo cyclonedx \
            --manifest-path crates/witness/Cargo.toml \
            --format json \
            --spec-version 1.5
          # cargo-cyclonedx writes one or more <crate>.cdx.json
          # files alongside each crate's manifest. Find the one
          # belonging to the `witness` binary crate (defensive —
          # filename pattern has changed across cyclonedx versions).
          SBOM=$(find crates/witness -maxdepth 2 -name "*.cdx.json" -type f | head -1)
          if [ -z "$SBOM" ]; then
            echo "::error::cargo cyclonedx produced no .cdx.json under crates/witness/"
            exit 1
          fi
          cp "$SBOM" "release-assets/witness-${BARE}.cdx.json"

      # SHA256SUMS includes every release asset present at this
      # point (tarballs, zip, wasm-reporter component, SBOM).
      - name: Generate SHA256SUMS.txt
        run: |
          cd release-assets && sha256sum ./* > SHA256SUMS.txt

      # SLSA v1 provenance for binary archives. The action attaches
      # the attestation to each subject's GitHub Release entry; no
      # extra asset is uploaded here (gh attestation verify downloads
      # it on demand).
      - name: Attest build provenance (SLSA v1)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*.tar.gz"

      # Cosign installer for both the per-asset signing (witness's
      # existing certification-evidence model — KEEP) and the
      # SHA256SUMS.txt bundle (NEW, per the brief).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      # Per-asset cosign signing — witness-specific carve-out from
      # the org-wide brief. Every tarball / zip / wasm gets its own
      # .sig + .cert because downstream certification flows consume
      # them as per-artifact attestations. The SHA256SUMS.txt itself
      # is skipped here — it's signed in the next step with a
      # bundle.
      - name: Sign release assets (per-asset, keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd release-assets
          for asset in *; do
            case "$asset" in
              *.sig|*.cert|*.pem|*.cosign.bundle|SHA256SUMS.txt) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.cert" \
              "$asset"
          done

      # Sums-file signing — produces the .sig / .pem / .cosign.bundle
      # triple the brief mandates. The bundle is a self-contained
      # cosign artifact (signature + cert + Rekor log entry) that
      # `cosign verify-blob --bundle` consumes without needing the
      # separate .sig / .pem files. Both forms shipped: belt-and-
      # suspenders for downstream consumers on different cosign
      # versions.
      - name: Sign SHA256SUMS.txt (cosign bundle)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd release-assets
          cosign sign-blob --yes \
            --bundle SHA256SUMS.txt.cosign.bundle \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt

      # Diagnostic metadata: which versions of rustc, cargo, cosign,
      # and the runner image produced this release. Not in
      # SHA256SUMS.txt (it's written after the sums) — pure
      # post-hoc forensics.
      - name: Write build-env.txt
        run: |
          {
            echo "tag: ${GITHUB_REF#refs/tags/}"
            echo "commit: ${GITHUB_SHA}"
            echo "runner: ${RUNNER_OS} (${RUNNER_ARCH})"
            echo "rustc: $(rustc --version)"
            echo "cargo: $(cargo --version)"
            echo "cosign: $(cosign version 2>&1 | head -1)"
            echo "workflow: ${GITHUB_WORKFLOW}"
            echo "workflow_ref: ${GITHUB_WORKFLOW_REF}"
          } > release-assets/build-env.txt

      - name: Compose release notes
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # Quoted heredoc terminator ('EOF') disables shell
          # expansion / backtick command-substitution inside the
          # body, so the cosign / gh code blocks ship verbatim.
          # $VERSION substitutions are done with sed after the
          # heredoc closes.
          cat > release-notes.md <<'EOF'
          ## Verifying this release

          Sums file (signed via cosign keyless OIDC; both bundle + sig/pem shipped):

          ```sh
          cosign verify-blob \
            --certificate-identity-regexp 'https://github.com/pulseengine/witness/.github/workflows/release.yml@.*' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            --bundle SHA256SUMS.txt.cosign.bundle SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt
          ```

          SLSA v1 build provenance for each tarball:

          ```sh
          gh attestation verify witness-__VERSION__-aarch64-apple-darwin.tar.gz --repo pulseengine/witness
          ```

          witness keeps the per-asset `.sig` / `.cert` cosign pair on every
          tarball / zip / wasm as certification evidence; the sums-file
          signing above is added on top, not a replacement.
          EOF
          sed -i "s|__VERSION__|$VERSION|g" release-notes.md

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          gh release create "$VERSION" \
            --title "witness $VERSION" \
            --notes-file release-notes.md \
            release-assets/*

  # v0.23.0 — Publish the static MC/DC viz dashboard for this release's
  # canonical verdict set to GitHub Pages. The dashboard is generated
  # by `witness-viz export` (depth-counted relative links, no HTMX, no
  # API endpoints) so it works from any URL prefix the Pages host
  # serves it at. Repo setting must be: Pages → Source → GitHub Actions.
  # One-time manual setup; if it's still "Branch" + "(none)" the
  # deploy-pages step below fails with a clear error pointing at the
  # setting.
  #
  # Second one-time gotcha — caught on v0.23.0 first cut: the
  # `github-pages` environment is auto-created with a default
  # deployment-branch policy that only allows `main`. Tag-triggered
  # deploys are rejected with "Tag X is not allowed to deploy to
  # github-pages due to environment protection rules". Fix: add a
  # `v*` tag policy via
  #   gh api -X POST repos/<owner>/<repo>/environments/github-pages/deployment-branch-policies \
  #     -f name='v*' -f type=tag
  # already applied to this repo; mention here so a fresh fork or
  # repo split doesn't re-hit it.
  publish-pages:
    name: Publish MC/DC viz dashboard to GitHub Pages
    needs: [compliance]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/download-artifact@v4
        with:
          name: compliance-evidence
          path: compliance-dl

      - name: Unpack compliance-evidence archive
        run: |
          set -euo pipefail
          ARCHIVE=$(find compliance-dl -name '*.tar.gz' -type f | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::no compliance-evidence archive found"
            exit 1
          fi
          mkdir -p evidence
          tar -xzf "$ARCHIVE" -C evidence
          echo "::notice::extracted compliance evidence from $ARCHIVE"
          ls evidence/verdict-evidence/ || ls evidence/

      # Build witness-viz fresh on this runner. Smaller than reusing
      # the build-binaries artifacts (different triples, different
      # archive shapes) and keeps this job self-contained.
      - name: Build witness-viz binary
        run: cargo build --release --bin witness-viz --manifest-path crates/witness-viz/Cargo.toml

      # v0.26 — multi-version site (DEC-033). The current tag renders
      # under dist/<VERSION>/ from the just-built compliance evidence
      # WITH --source-root (its verdicts/ tree is the checkout). The
      # two most-recent prior published releases are downloaded and
      # rendered under dist/<tag>/ WITHOUT source (their decisions
      # would mis-point against the moved-on verdicts/ tree). A
      # cross-version landing page (witness-viz pages-index) ties them
      # together at dist/index.html. `actions/deploy-pages` replaces
      # the whole site each run, so the full tree is rebuilt here.
      - name: Generate multi-version MC/DC dashboard
        env:
          GITHUB_REF: ${{ github.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"
          VIZ=./crates/witness-viz/target/release/witness-viz
          mkdir -p dist

          # Locate verdict-evidence inside an unpacked archive dir.
          find_reports() {
            if [ -d "$1/verdict-evidence" ]; then echo "$1/verdict-evidence";
            elif [ -d "$1/compliance/verdict-evidence" ]; then echo "$1/compliance/verdict-evidence";
            else return 1; fi
          }

          # --- current tag: render WITH source from the built evidence ---
          REPORTS=$(find_reports evidence) || {
            echo "::error::can't locate verdict-evidence/ for ${VERSION}"
            find evidence -maxdepth 3 -type d
            exit 1
          }
          "$VIZ" --reports-dir "$REPORTS" export \
            --out "dist/${VERSION}" \
            --site-title "witness ${VERSION}" \
            --source-root verdicts
          echo "::notice::rendered ${VERSION} (with source)"

          # --- two most-recent PRIOR published releases, no source ---
          # gh lists newest-first; the current tag's release may not be
          # published yet (publish-pages races create-github-release),
          # so it's handled above and excluded here.
          PRIORS=$(gh release list --limit 30 --json tagName --jq '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${VERSION}$" | head -2 || true)
          for tag in $PRIORS; do
            rm -rf dl ev2
            if ! gh release download "$tag" --pattern '*compliance-evidence*' --dir dl 2>/dev/null; then
              echo "::warning::no compliance-evidence asset for $tag; skipping"
              continue
            fi
            arc=$(find dl -name '*.tar.gz' -type f | head -1)
            [ -n "$arc" ] || { echo "::warning::empty download for $tag"; continue; }
            mkdir -p ev2 && tar -xzf "$arc" -C ev2
            r=$(find_reports ev2) || { echo "::warning::no verdict-evidence in $tag"; continue; }
            "$VIZ" --reports-dir "$r" export \
              --out "dist/${tag}" \
              --site-title "witness ${tag}"
            echo "::notice::rendered ${tag} (no source)"
          done

          # --- cross-version landing page at dist/index.html ---
          "$VIZ" pages-index --site-dir dist

          # Sanity: every page starts with a doctype (not truncated).
          find dist -name '*.html' -print0 \
            | xargs -0 -I{} sh -c 'head -1 "{}" | grep -qi doctype || (echo "::error::{} missing doctype" && exit 1)'
          echo "=== site tree ===" && find dist -maxdepth 1
          echo "=== landing index (head) ===" && head -40 dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
