name: Coverage Delta

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "crates/**"
      - "verdicts/**"
      - ".github/workflows/witness-delta.yml"
      - ".github/actions/compliance/**"

permissions:
  pull-requests: write

concurrency:
  group: witness-delta-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  coverage-delta:
    name: Coverage Delta
    runs-on: [self-hosted, linux, x64, rust-cpu]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          path: head
          fetch-depth: 0
      - uses: actions/checkout@v5
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: head

      - name: Build witness (head)
        working-directory: head
        run: cargo build --release

      - name: Locate manifests if present
        id: fixtures
        continue-on-error: true
        run: |
          set -euo pipefail
          base_manifest=""
          head_manifest=""
          if [ -f base/tests/fixtures/sample-rust-crate/sample.wasm.witness.json ]; then
            base_manifest="base/tests/fixtures/sample-rust-crate/sample.wasm.witness.json"
          fi
          if [ -f head/tests/fixtures/sample-rust-crate/sample.wasm.witness.json ]; then
            head_manifest="head/tests/fixtures/sample-rust-crate/sample.wasm.witness.json"
          fi
          echo "base_manifest=$base_manifest" >> "$GITHUB_OUTPUT"
          echo "head_manifest=$head_manifest" >> "$GITHUB_OUTPUT"

      - name: Compute manifest delta
        if: ${{ steps.fixtures.outputs.base_manifest != '' && steps.fixtures.outputs.head_manifest != '' }}
        continue-on-error: true
        run: |
          mkdir -p delta-out
          ./head/target/release/witness diff \
            --base "${{ steps.fixtures.outputs.base_manifest }}" \
            --head "${{ steps.fixtures.outputs.head_manifest }}" \
            --output delta-out/coverage-delta.json \
            --format json
          ./head/target/release/witness diff \
            --base "${{ steps.fixtures.outputs.base_manifest }}" \
            --head "${{ steps.fixtures.outputs.head_manifest }}" \
            --output delta-out/coverage-delta.txt \
            --format text

      - name: Upload delta artifact
        if: ${{ steps.fixtures.outputs.head_manifest != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: witness-delta-pr-${{ github.event.pull_request.number }}
          path: delta-out/
          retention-days: 14
          if-no-files-found: warn

  # v0.6.6 — verdict-suite delta. Builds the suite against base and head
  # of the PR, walks the report.json files, and posts a per-verdict
  # comparison table as a PR comment. continue-on-error: true so suite
  # failures don't block merge — the comment is the signal.
  verdict-suite-delta:
    name: Verdict suite delta
    runs-on: [self-hosted, linux, x64, rust-cpu]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          path: head
          fetch-depth: 0
      - uses: actions/checkout@v5
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: head

      - name: Build witness (head)
        working-directory: head
        run: cargo build --release -p witness

      - name: Build witness (base)
        working-directory: base
        run: cargo build --release -p witness 2>/dev/null || echo "base build failed; treating as no-base"

      - name: Run verdict suite (head)
        run: |
          set -uo pipefail
          if [ -x head/verdicts/run-suite.sh ]; then
            ( cd head && SIGN=0 ./verdicts/run-suite.sh ../delta-head 2>&1 | tail -25 || true )
          fi

      - name: Run verdict suite (base, if present)
        run: |
          set -uo pipefail
          if [ -x base/verdicts/run-suite.sh ] && [ -f base/target/release/witness ]; then
            ( cd base && SIGN=0 ./verdicts/run-suite.sh ../delta-base 2>&1 | tail -25 || true )
          else
            echo "base does not have verdict suite (probably pre-v0.6.3); skipping base side"
          fi

      - name: Compute verdict-suite delta
        run: |
          set -euo pipefail
          mkdir -p delta-out
          python3 head/.github/workflows/scripts/verdict_delta.py \
            delta-base delta-head delta-out/verdict-delta.md \
            || echo "delta script unavailable; skipping comment body"

      - name: Post comment
        if: ${{ hashFiles('delta-out/verdict-delta.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('delta-out/verdict-delta.md', 'utf8');
            const marker = '<!-- witness-verdict-delta -->';
            const fullBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: fullBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: fullBody });
            }

      - name: Upload verdict-delta artifact
        uses: actions/upload-artifact@v4
        with:
          name: witness-verdict-delta-pr-${{ github.event.pull_request.number }}
          path: delta-out/
          retention-days: 14
          if-no-files-found: warn
