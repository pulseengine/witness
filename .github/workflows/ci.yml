name: CI

# Cancel superseded PR runs; never cancel main, scheduled, or dispatched
# runs. Group by workflow + branch (head_ref on PRs, ref otherwise) so
# distinct workflows on the same branch don't fight each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: [self-hosted, linux, x64, light]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: [self-hosted, linux, x64, rust-cpu]
          # Stays on ubuntu-latest equivalents: smithy is Linux x86_64 only.
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  msrv:
    name: MSRV (1.91)
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  miri:
    name: Miri
    runs-on: [self-hosted, linux, x64, lean-mem]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run miri on the lib
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-tree-borrows"
        # Miri does not run wasmtime / walrus FFI cleanly; constrain
        # to the witness pure-Rust modules that benefit from UB
        # detection (decisions, error, report, predicate hex/SHA path).
        run: |
          cargo miri test --lib report::
          cargo miri test --lib decisions::
          cargo miri test --lib predicate::tests::sha256_known_vector
          cargo miri test --lib predicate::tests::rfc3339_format_is_well_formed

  deny:
    name: Cargo Deny
    runs-on: [self-hosted, linux, x64, light]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # Smithy workaround: EmbarkStudios/cargo-deny-action launches a
      # rootless container which fails under our hardened runner unit
      # (NoNewPrivileges=true blocks newuidmap). Run cargo-deny directly.
      # Skip `advisories` here — that check stays on the hosted `audit`
      # job until smithy ships cargo-audit 0.22.1+ (RUSTSEC-2026-0037
      # CVSS 4.0 parser issue).
      - run: cargo install cargo-deny --locked --version 0.16.4 || true
      - run: cargo deny check bans licenses sources

  audit:
    name: Security Audit
    # Stays on ubuntu-latest: smithy ships cargo-audit v0.21.2 whose
    # bundled rustsec parser rejects CVSS 4.0 advisories
    # (RUSTSEC-2026-0037). Move back once smithy bumps cargo-audit to
    # 0.22.1+.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo install cargo-audit --locked
          cargo audit

  proptest-extended:
    name: Proptest (extended cases)
    runs-on: [self-hosted, linux, x64, rust-cpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test properties
        env:
          PROPTEST_CASES: "2048"

  mutants:
    name: Mutation testing (informational)
    runs-on: [self-hosted, linux, x64, lean-mem]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo install cargo-mutants --locked
          cargo mutants --no-shuffle --timeout-multiplier 3 -j 2 || true

  coverage:
    name: Coverage
    runs-on: [self-hosted, linux, x64, rust-cpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --lcov --output-path lcov.info --all-targets
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          flags: rust-source
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dogfood:
    name: Dogfood — witness measures the fixture
    runs-on: [self-hosted, linux, x64, rust-cpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build witness binary
        run: cargo build --release -p witness
      - name: Build fixture wasm
        run: |
          chmod +x crates/witness/tests/fixtures/sample-rust-crate/build.sh
          cd crates/witness/tests/fixtures/sample-rust-crate
          ./build.sh
      - name: Instrument + run + emit LCOV
        run: |
          set -euo pipefail
          fixture="crates/witness/tests/fixtures/sample-rust-crate/sample.wasm"
          ./target/release/witness instrument "$fixture" \
            -o sample.instrumented.wasm
          ./target/release/witness run sample.instrumented.wasm \
            --invoke run_then_arm \
            --invoke run_else_arm \
            --invoke run_brif_taken \
            --invoke run_brif_not_taken \
            --invoke run_match_arm_0 \
            --invoke run_match_arm_1 \
            --invoke run_match_default \
            --output witness-run.json
          ./target/release/witness lcov \
            --run witness-run.json \
            --manifest sample.instrumented.wasm.witness.json \
            -o wasm-bytecode.lcov.info \
            --overview witness-overview.txt
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-bytecode-coverage
          path: |
            wasm-bytecode.lcov.info
            witness-overview.txt
            witness-run.json
            sample.instrumented.wasm.witness.json
      - uses: codecov/codecov-action@v4
        with:
          files: wasm-bytecode.lcov.info
          flags: wasm-bytecode
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  wasm-component:
    name: Build witness-component (Component Model wasm) — v0.7.0+
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Build witness-component (wasm32-wasip2)
        working-directory: crates/witness-component
        run: cargo build --release --target wasm32-wasip2
      - name: Inspect emitted component
        run: |
          set -euo pipefail
          # wasm-tools is widely available as a binary; install via cargo
          # if the runner doesn't have it. Quick because release cache.
          cargo install wasm-tools --quiet || true
          wasm-tools validate crates/witness-component/target/wasm32-wasip2/release/witness_component.wasm
          wasm-tools component wit crates/witness-component/target/wasm32-wasip2/release/witness_component.wasm | head -25
      - uses: actions/upload-artifact@v4
        with:
          name: witness-component-wasm
          path: crates/witness-component/target/wasm32-wasip2/release/witness_component.wasm
          if-no-files-found: warn

  schemas:
    name: Schemas — validate fixtures against shipped JSON Schema docs (informational)
    runs-on: [self-hosted, linux, x64, light]
    # v0.10.0 item 5 — published schemas live at docs/schemas/. CI proves
    # the shipped report.json / predicate.json fixtures match those
    # schemas. Informational while the schema work settles; will gate
    # the release once we've absorbed any drift.
    continue-on-error: true
    needs: verdict-suite
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Install jsonschema
        run: |
          python3 -m pip install jsonschema --quiet
          python3 -m jsonschema --version
      - name: Download verdict evidence
        uses: actions/download-artifact@v4
        with:
          name: verdict-evidence
          path: build/verdict-evidence
      - name: Validate report.json against witness-mcdc/v1
        run: |
          set -euo pipefail
          schema=docs/schemas/witness-mcdc-v1.json
          for v in leap_year triangle state_guard safety_envelope parser_dispatch nom_numbers state_machine json_lite; do
            f="build/verdict-evidence/$v/report.json"
            if [ -f "$f" ]; then
              echo "validate $f"
              python3 -m jsonschema -i "$f" "$schema"
            fi
          done
      - name: Validate predicate.json against witness-coverage/v1
        run: |
          set -euo pipefail
          schema=docs/schemas/witness-coverage-v1.json
          for v in leap_year triangle state_guard safety_envelope parser_dispatch nom_numbers state_machine json_lite; do
            f="build/verdict-evidence/$v/predicate.json"
            if [ -f "$f" ]; then
              echo "validate $f"
              python3 -m jsonschema -i "$f" "$schema"
            fi
          done

  verdict-suite:
    name: Verdict suite — end-to-end MC/DC on the canonical 7
    runs-on: [self-hosted, linux, x64, rust-cpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build witness binary
        run: cargo build --release -p witness
      - name: Run verdict suite
        run: |
          chmod +x verdicts/run-suite.sh
          ./verdicts/run-suite.sh build/verdict-evidence
      - name: Regression gate — verdicts that should produce decisions
        run: |
          set -euo pipefail
          # These verdicts must produce non-empty decisions for v0.6.2+ to
          # be considered green. The two zero-decision verdicts
          # (range_overlap, mixed_or_and) get fully optimised to bitwise
          # arithmetic by rustc and are intentionally not in this gate.
          # v0.7.0 added httparse — expected to produce 50+ decisions
          # across the parser + inlined stdlib. The exact count varies
          # with rustc version so the gate just asserts >= 30.
          for v in leap_year triangle state_guard safety_envelope parser_dispatch nom_numbers state_machine json_lite; do
            n=$(python3 -c "import json; print(len(json.load(open('build/verdict-evidence/$v/run.json'))['decisions']))")
            if [ "$n" -lt 1 ]; then
              echo "REGRESSION: $v has 0 decisions; expected >= 1" >&2
              exit 1
            fi
            echo "ok: $v has $n decision(s)"
          done
          h=$(python3 -c "import json; print(len(json.load(open('build/verdict-evidence/httparse/run.json'))['decisions']))" 2>/dev/null || echo 0)
          if [ "$h" -lt 30 ]; then
            echo "REGRESSION: httparse has $h decisions; expected >= 30" >&2
            exit 1
          fi
          echo "ok: httparse has $h decision(s)"
          # v0.7.5: also gate on the proved-condition count. Below this floor
          # is a regression in either decisions reconstruction or pair-finding.
          p=$(python3 -c "import json; print(json.load(open('build/verdict-evidence/httparse/report.json'))['overall']['conditions_proved'])" 2>/dev/null || echo 0)
          if [ "$p" -lt 20 ]; then
            echo "REGRESSION: httparse has $p proved conditions; expected >= 20" >&2
            exit 1
          fi
          echo "ok: httparse has $p proved condition(s)"
      - uses: actions/upload-artifact@v4
        with:
          name: verdict-evidence
          path: build/verdict-evidence/
