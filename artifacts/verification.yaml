# Witness verification measures — maps each test suite + end-to-end
# step to one rivet `test-case` artifact whose `fields.steps[].run`
# commands are executed by the verification gate workflow.
#
# The `test-case` type is defined in schemas/witness-verification.yaml
# (rivet's built-in `feature` type doesn't recognise method/steps;
# defining a proper schema keeps `rivet validate` clean of warnings).
#
# Mirrored from pulseengine/spar's pattern (commit ba329f3d). Run
# locally:
#     tools/run_verification.py
# Or scope per-PR via the PR body:
#     Verify-Filter: (and (= type "test-case") (has-tag "unit-tests"))

artifacts:

  # -------------------------------------------------------------------------
  # Unit test crates — one verification artifact per crate
  # -------------------------------------------------------------------------

  - id: TEST-CORE
    type: test-case
    title: witness-core unit tests
    description: >
      Unit tests for decisions.rs (DWARF reconstruction + IfThen/BrIf
      clustering), mcdc_report.rs (schema versioning + per_context
      bucketing), instrument.rs (counter rewrite), and surrounding
      modules. Includes the v0.19 IfThen+BrIf clustering regression
      tests.
    tags: [verification, unit-tests]
    fields:
      method: automated-test
      steps:
        - run: cargo test --release -p witness-mcdc-core
    links:
      - type: satisfies
        target: REQ-001
      - type: satisfies
        target: REQ-002
      - type: satisfies
        target: REQ-003
      - type: satisfies
        target: REQ-004

  - id: TEST-CLI
    type: test-case
    title: witness CLI unit tests
    description: >
      Tests for the witness binary: argument parsing, subcommand
      routing, schema version flags, error handling.
    tags: [verification, unit-tests]
    fields:
      method: automated-test
      steps:
        - run: cargo test --release -p witness-mcdc
    links:
      - type: satisfies
        target: REQ-001

  - id: TEST-CHECKER
    type: test-case
    title: witness-mcdc-checker unit tests
    description: >
      Tests for the mcdc-v1/v2/v3 schema validator and predicate
      envelope checker.
    tags: [verification, unit-tests]
    fields:
      method: automated-test
      steps:
        - run: cargo test --release -p witness-mcdc-checker
    links:
      - type: satisfies
        target: REQ-001

  # -------------------------------------------------------------------------
  # Static analysis — clippy / format / cargo-deny / security audit
  # -------------------------------------------------------------------------

  - id: TEST-CLIPPY
    type: test-case
    title: Clippy lints — SCRC Phase 1 + Phase 2 + safety-critical set
    description: >
      Workspace-wide clippy with -D warnings, including
      unwrap_used / expect_used / indexing_slicing /
      arithmetic_side_effects / panic / todo / unimplemented /
      undocumented_unsafe_blocks etc. (the safety-critical set
      defined in workspace.lints.clippy in Cargo.toml).
    tags: [verification, static-analysis]
    fields:
      method: automated-test
      steps:
        - run: cargo clippy --workspace --release --all-targets -- -D warnings
    links:
      - type: satisfies
        target: REQ-001

  - id: TEST-FORMAT
    type: test-case
    title: rustfmt compliance
    description: All workspace code passes cargo fmt --check.
    tags: [verification, static-analysis]
    fields:
      method: automated-test
      steps:
        - run: cargo fmt --all -- --check
    links:
      - type: satisfies
        target: REQ-001

  - id: TEST-DENY
    type: test-case
    title: cargo-deny — bans / licenses / sources check
    description: >
      Audits the workspace dep tree for forbidden licenses,
      banned crates, and approved source registries. Matches
      the existing `Cargo Deny` CI job's invocation
      (`cargo deny check bans licenses sources`).

      The `advisories` check is intentionally skipped here while
      smithy ships cargo-audit < 0.22.1 — newer RUSTSEC
      advisories (e.g. RUSTSEC-2026-0037 for quinn-proto) use
      CVSS 4.0 format which the bundled rustsec parser can't
      read, breaking `cargo deny check advisories` on every
      runner. The Security Audit job on ubuntu-latest covers
      the advisory check separately until smithy bumps the
      parser.
    tags: [verification, security]
    fields:
      method: automated-test
      steps:
        - run: cargo install cargo-deny --locked --version 0.16.4 || true
        - run: cargo deny check bans licenses sources
    links:
      - type: satisfies
        target: REQ-001

  # -------------------------------------------------------------------------
  # End-to-end verification — verdict suite + cross-language probes
  # -------------------------------------------------------------------------

  - id: TEST-VERDICT-SUITE
    type: test-case
    title: Canonical 7 verdict suite — end-to-end MC/DC
    description: >
      Build → instrument → run → report on the canonical 7 Rust
      verdicts. Decision-count delta vs main is the canary that
      catches clustering regressions.
    tags: [verification, end-to-end]
    fields:
      method: automated-test
      steps:
        - run: verdicts/build-all.sh
        - run: cargo build --release -p witness-mcdc
        - run: WITNESS=target/release/witness verdicts/run-suite.sh
    links:
      - type: satisfies
        target: REQ-001
      - type: satisfies
        target: REQ-002

  - id: TEST-CROSS-LANG-RUST
    type: test-case
    title: Rust cross-language fixture instrumentation
    description: >
      Verifies that each verdict in verdicts/ instruments cleanly
      and produces the expected branch + Decision counts. Specific
      regression target after v0.19 IfThen clustering change.
    tags: [verification, cross-language, end-to-end]
    fields:
      method: automated-test
      steps:
        - run: cargo build --release -p witness-mcdc
        - run: |
            for v in leap_year range_overlap triangle state_guard mixed_or_and safety_envelope parser_dispatch; do
              target/release/witness instrument "verdicts/$v/verdict_$v.wasm" -o "/tmp/witness_${v}.wasm" >/dev/null
            done
    links:
      - type: satisfies
        target: REQ-001

  # -------------------------------------------------------------------------
  # Schema validation — mcdc-v1/v2/v3 envelopes round-trip
  # -------------------------------------------------------------------------

  - id: TEST-SCHEMAS
    type: test-case
    title: mcdc-v1/v2/v3 schema validation
    description: >
      Validates shipped predicate envelopes against the JSON Schema
      docs at docs/schemas/. Catches schema drift introduced by
      witness-core changes.
    tags: [verification, schemas]
    fields:
      method: automated-test
      steps:
        - run: cargo test --release -p witness-mcdc-checker -- --include-ignored
    links:
      - type: satisfies
        target: REQ-001

  # -------------------------------------------------------------------------
  # v0.36 — verification for the Component-Model run-path requirements.
  # These use `verifies` (a test verifies a requirement; cf. `satisfies`
  # which is for implementations) and name the actual test functions, so
  # a reader can map the requirement to the exact test that exercises it.
  # (pulseengine.eu#94 — closing the silent requirement→test gap.)
  # -------------------------------------------------------------------------
  - id: TEST-INPLACE
    type: test-case
    title: instrument --in-place keeps the component shell, counters in inner core
    description: >
      Oracle `instrument_in_place_emits_component_with_instrumented_core`
      (crates/witness-core/src/instrument.rs): instrument-in-place a leaf
      component, assert the output re-parses as a component whose inner
      core exports `__witness_counter_*`, and that a bare-core input is
      rejected. End-to-end (manual, recorded in #110): a real wasm32-wasip2
      component passes `wasm-tools validate` post-splice.
    tags: [verification, unit-tests, component-model]
    fields:
      method: automated-test
      steps:
        - run: cargo test -p witness-mcdc-core instrument_in_place_emits_component_with_instrumented_core
    links:
      - type: verifies
        target: REQ-059

  - id: TEST-CROSSCHECK
    type: test-case
    title: cross-check flags per-branch counter divergence between runtimes
    description: >
      Oracles in crates/witness-core/src/cross_check.rs:
      `identical_runs_agree` (same counters ⇒ AGREE),
      `a_counter_divergence_is_flagged` (one differing counter ⇒ DIVERGE
      with both values), `branch_set_mismatch_is_a_divergence`
      (differing branch sets ⇒ divergence). CLI exit-code path verified
      manually: identical ⇒ 0, divergent ⇒ 1.
    tags: [verification, unit-tests, dual-runtime]
    fields:
      method: automated-test
      steps:
        - run: cargo test -p witness-mcdc-core cross_check
    links:
      - type: verifies
        target: REQ-058
