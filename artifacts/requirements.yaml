      between consecutive releases, plus links into each versioned
      dashboard. A reviewer or auditor can see how structural
      coverage evolved across releases without checking out old tags.
    tags: [v0.26, viz, pages]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # v0.27 — publishable crate names + inline call-chain visibility
  # -------------------------------------------------------------------------
  - id: REQ-051
    type: requirement
    title: Crates published under a conflict-free namespace
    status: implemented
    description: >
      The published crates shall use a namespace that does not
      collide with an unrelated prior registration on crates.io, so
      the whole set (`witness-mcdc`, `witness-mcdc-core`,
      `witness-mcdc-viz`, `witness-mcdc-checker`) can be published.
      The `witness` and `witness-core` names are taken by an
      unrelated crate (`flammafex/Sibyl`); the `witness-mcdc-*`
      namespace is free and already partly ours
      (`witness-mcdc-checker`). The installed CLI binary name shall
      remain `witness` — the namespace change is a crates.io
      identity concern, not a user-facing command change.
    tags: [v0.27, packaging, crates-io]
    fields:
      priority: should
      category: non-functional

  - id: REQ-052
    type: requirement
    title: Per-condition provenance visibility
    status: implemented
    description: >
      When a decision carries many conditions attributed to one
      source line, the dashboard shall show, per condition, the
      provenance that explains why: the (demangled) function the
      branch lives in, the branch kind (`br_if` /
      `br_table_target` / `br_table_default`), and — when the branch
      was inlined — its DWARF inline call chain
      (`call_file:call_line` frames). A reviewer seeing N conditions
      on a line can then distinguish the common cases: a `br_table`
      (a `match` compiled to one jump table — N arms at one byte
      offset, no call, no depth) vs branches genuinely inlined from
      a callee (which carry a non-empty chain).

      Rationale-of-record: the motivating example (json_lite
      decision #29, 29 conditions on one line) turned out to be a
      `br_table` in `parse_primitive`, NOT an inlined `parse_string`
      — all 29 share `byte_offset 1148` with `kind:
      br_table_target/default` and have no inline chain. The earlier
      framing ("inline call-chain visibility") was too narrow:
      `branch_inline_chains` covers only the handful of genuinely
      inlined branches (2 of 165 in json_lite), so chain-only
      rendering would explain almost nothing. `function_name` +
      `kind` from the manifest `branches[]` array is the signal that
      actually answers "what am I looking at"; the inline chain is an
      additional layer for the branches that have one.
    tags: [v0.27, viz, mcdc]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # v0.28 — first-class wasip2 / Component-Model input
  # -------------------------------------------------------------------------
  - id: REQ-053
    type: requirement
    title: Instrument wasip2 components without a manual unbundle step
    status: implemented
    description: >
      `witness instrument` (and `witness all`) shall accept a Wasm
      Component (e.g. the output of `cargo build --target
      wasm32-wasip2`) directly: when given a component, the tool
      extracts the embedded core module and instruments that, rather
      than erroring with a manual `wasm-tools component unbundle`
      instruction. This removes the friction that made wasm32-wasip2
      — the ecosystem-direction target — a second-class citizen.

      Selection: `instrument` runs before any export is named
      (exports are given at `run` time), so it cannot pick by target
      export. It extracts the SOLE embedded core module — which is
      exactly what a leaf/computational wasip2 build produces.

      Scope (honest bound): this serves leaf / computational
      functions whose extracted core module is self-contained (no
      Component-Model/p2 imports — the common MC/DC case, verified:
      a no-syscall function's wasip2 core has zero imports and runs
      under witness's existing preview1 runtime). A component with
      multiple core modules (a preview1→p2 adapter beside the main
      module — the syscall-heavy case) is out of scope and routes to
      wasm32-wasip1 with a clear message rather than failing obscurely.
    tags: [v0.28, instrument, wasip2, component-model]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # v0.30 — MC/DC on Component-Model inputs via meld fusion
  # -------------------------------------------------------------------------
  - id: REQ-054
    type: requirement
    title: MC/DC on Component-Model wasm via meld fusion
    status: implemented
    description: >
      The system shall support measuring MC/DC on WebAssembly
      Component-Model artifacts by composing with meld rather than
      growing component surgery inside witness: meld fuses a
      component into a single core module (resolving the canonical
      ABI at build time), and witness instruments that core module
      with its existing core-module pipeline. For Component inputs
      witness cannot instrument directly, the tool shall point the
      user at the meld fusion step with a precise, copy-pasteable
      command rather than a generic error.

      Scope (honest bound, spike-verified): a leaf/computational
      component fuses to a core module with zero imports →
      instrument + run + report all work today (`is_leap` measured
      3/3). A syscall-heavy component's fused core imports the WASI
      p2 interfaces (`wasi:cli/*`, `wasi:io/*`) → witness instruments
      it but cannot run it under the embedded preview1 runtime; that
      case routes to `--harness` (FEAT-006) or a future p2 host.
    tags: [v0.30, component-model, meld, mcdc]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # v0.31 — readable demangled function attribution
  # -------------------------------------------------------------------------
  - id: REQ-055
    type: requirement
    title: Readable (demangled) function attribution in coverage evidence
    status: implemented
    description: >
      The system shall surface a human-readable, demangled function
      name for each branch's attribution wherever witness emits
      function names — the report JSON, LCOV, rivet-evidence, and
      the predicate Statement — not only in the HTML visualiser.
      A branch in a Rust function whose name-section symbol is
      `_ZN17verdict_leap_year12is_leap_year17h..E` shall be
      attributed as `verdict_leap_year::is_leap_year`; a C++ mangled
      symbol shall be demangled likewise; a name that is not a
      recognised mangling shall pass through unchanged.

      The raw mangled symbol shall be retained as ground truth for
      attestation stability (the demangled form is a derived display
      value, not a replacement). This makes the v0.30 meld→witness
      composition legible for real components, whose fused cores
      carry mangled symbols once built with `meld fuse
      --preserve-names`.
    tags: [v0.31, demangle, attribution, reporting]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # v0.35 — addressing WIT-style export names (issue #107)
  # -------------------------------------------------------------------------
  - id: REQ-056
    type: requirement
    title: Typed invocation shall address any export name, including WIT-style
    status: proposed
    description: >
      `witness run --invoke-with-args` shall be able to target an export
      whose name contains a colon — notably Component-Model / canonical-
      ABI names of the form `namespace:package/iface@ver#func` (and
      async-lift mangled names like `[async-lift]...#monitor`). The
      legacy `name:args` spec splits on the first colon, which is part
      of every WIT name, making such exports unaddressable (issue #107,
      reported from relay's P3 work). No-arg invocation via `--invoke`
      already works (it does not split).
    tags: [v0.35, cli, component-model, issue-107]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # FUTURE — async-lift stream export coverage (issue #107, deferred)
  # -------------------------------------------------------------------------
  - id: REQ-057
    type: requirement
    title: Drive async-lift (P3 stream) exports to completion for coverage
    status: proposed
    description: >
      witness shall be able to exercise an async-lift stream export —
      e.g. a P3 `stream<T> -> stream<U>` transformer lowered to
      `[async-lift]...#monitor` — by feeding a bounded input stream and
      driving the task to completion, so its instrumented branches
      actually execute. Today such an export instruments fine (relay's
      cascade: 2713 branches) but the run reports `invoked: []` / 0 hits
      because an async-lift export is not call-return: invoking it
      returns a stream handle without running the body (the body runs on
      stream poll). The call-return `--invoke` / `--invoke-with-args`
      model cannot drive it.

      DEFERRED (issue #107, 2026-06-18): this needs a P3-async host that
      pumps streams to completion — part of the Component-Model run-path
      epic (cf. the syscall-heavy spike). Not scheduled; landed here so a
      regression/again-asked re-opens the right requirement. Consumer
      side tracked at relay#202; the call-return separator half is
      REQ-056 (v0.35).
    tags: [future, component-model, async, p3, issue-107]
    fields:
      priority: could
      category: functional
