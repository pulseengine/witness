artifacts:
  # -------------------------------------------------------------------------
  # v0.1 — branch-level coverage on WebAssembly (SHIPPED 2026-04-24)
  # -------------------------------------------------------------------------
  - id: REQ-001
    type: requirement
    title: Instrument Wasm modules with branch counters
    status: approved
    description: >
      The system shall rewrite a .wasm module to count the number of times
      each br_if and if-else (per arm) is taken during execution, and how
      many times each br_table is executed (per-target counting is REQ-013,
      v0.2). The instrumented module shall be semantically equivalent to
      the original module for every well-formed input, modulo the exported
      __witness_counter_* globals.
    tags: [v0.1, core, instrumentation, shipped]
    fields:
      priority: must
      category: functional

  - id: REQ-002
    type: requirement
    title: Execute instrumented module and collect counters
    status: approved
    description: >
      The system shall provide a command-line interface that runs an
      instrumented Wasm module and collects counter values. v0.1 ships
      this via an embedded wasmtime runner that invokes user-specified
      no-argument exports. Subprocess harness mode (REQ-014) is the v0.2
      escape hatch for non-wasmtime runtimes.
    tags: [v0.1, core, runtime, shipped]
    fields:
      priority: must
      category: functional

  - id: REQ-003
    type: requirement
    title: Emit branch-coverage report
    status: approved
    description: >
      The system shall produce a coverage report keyed to
      (function_index, instr_index, kind) for each branch point, in both
      human-readable text and machine-readable JSON formats. Reports must
      be deterministic for a given (module, run-data) pair.
    tags: [v0.1, core, reporting, shipped]
    fields:
      priority: must
      category: functional

  - id: REQ-004
    type: requirement
    title: Semantic preservation under instrumentation
    status: approved
    description: >
      For any well-formed Wasm module M and any input I, the observable
      output of the instrumented module M' on input I shall be identical
      to the observable output of M on input I, with the exception of
      the exported __witness_counter_* mutable globals (and, in v0.2+,
      the exported __witness_brtable_* helper functions and their
      side-effectful counter updates).
    tags: [v0.1, invariant, correctness, shipped]
    fields:
      priority: must
      category: non-functional

  # -------------------------------------------------------------------------
  # v0.2 — MC/DC condition decomposition + per-target br_table + harness mode
  # -------------------------------------------------------------------------
  - id: REQ-005
    type: requirement
    title: MC/DC condition decomposition when DWARF is present
    status: draft
    description: >
      When DWARF-in-Wasm information is available in the module, the system
      shall reconstruct source-level decisions from sequences of br_if
      instructions and report MC/DC satisfaction at the decision level.
      Falls back to the strict per-br_if interpretation (REQ-001) when
      DWARF is absent. The reconstruction must support decisions of any
      condition count — no artificial cap (REQ-015).
    tags: [v0.2, mcdc]
    fields:
      priority: must
      category: functional

  - id: REQ-006
    type: requirement
    title: Decision-granularity algorithm shall be documented and sound
    status: draft
    description: >
      The algorithm used for reconstructing source-level decisions from
      Wasm br_if sequences shall be specified in DESIGN.md and accompanied
      by a soundness argument relative to source-level MC/DC, published
      as a short paper at docs/paper/v0.2-mcdc-wasm.md. The soundness
      claim is the coverage-lifting argument (REQ-016). Cite arxiv
      2409.08708 ("Towards MC/DC of Rust") directly.
    tags: [v0.2, mcdc, research]
    fields:
      priority: must
      category: non-functional

  - id: REQ-013
    type: requirement
    title: Per-target br_table counting
    status: draft
    description: >
      The system shall count each br_table target separately, not the
      br_table instruction as a whole. When DWARF is present, each target
      shall be mapped to its source-level match arm. The implementation
      uses a helper-function-call pattern (DEC-008) to keep per-branch
      cost bounded.
    tags: [v0.2, instrumentation]
    fields:
      priority: must
      category: functional

  - id: REQ-014
    type: requirement
    title: Subprocess harness mode (--harness)
    status: draft
    description: >
      The system shall provide a --harness <cmd> CLI mode that spawns a
      user-supplied subprocess (e.g. cargo test, wasm-bindgen-test) with
      WITNESS_MODULE / WITNESS_OUTPUT / WITNESS_MANIFEST environment
      variables set, and joins the harness-written counter dump back with
      the manifest. Provides an escape hatch for runtimes the embedded
      wasmtime cannot accommodate (browser-based tests, wasi-preview2-only
      modules, custom WASI capability profiles).
    tags: [v0.2, runtime]
    fields:
      priority: must
      category: functional

  - id: REQ-015
    type: requirement
    title: No artificial condition-count cap
    status: draft
    description: >
      The system shall not impose an artificial cap on the number of
      conditions per decision. Clang and rustc both cap at 6 conditions
      because LLVM's coverage bitmap encodes combinations as integers
      in [0, 2^N). Witness uses exported globals — no encoder constraint.
      Decisions of any size must be supported.
    tags: [v0.2, mcdc, differentiation]
    fields:
      priority: must
      category: non-functional

  - id: REQ-016
    type: requirement
    title: Coverage-lifting soundness argument
    status: draft
    description: >
      The system shall ship a written soundness argument (in the v0.2
      paper at docs/paper/v0.2-mcdc-wasm.md) showing that MC/DC at Wasm
      level, when produced by the DWARF reconstruction algorithm,
      projects soundly to source-level MC/DC under the assumption that
      the rustc + LLVM lowering preserves the independence-of-condition
      relation (the witness-and-checker variant per DEC-010). The
      assumption shall be explicit; v1.0 (REQ-011) closes it via the
      Check-It pattern.
    tags: [v0.2, mcdc, research]
    fields:
      priority: must
      category: non-functional

  # -------------------------------------------------------------------------
  # v0.3 — ecosystem integration (rivet, sigil)
  # -------------------------------------------------------------------------
  - id: REQ-007
    type: requirement
    title: Emit coverage as rivet-compatible evidence
    status: draft
    description: >
      The system shall emit coverage reports in a format that rivet can
      consume as requirement-to-test evidence, linking coverage data to
      rivet artifact IDs via source mapping.
    tags: [v0.3, rivet]
    fields:
      priority: must
      category: functional

  - id: REQ-008
    type: requirement
    title: Emit coverage as in-toto predicate for sigil
    status: draft
    description: >
      The system shall emit coverage reports in the in-toto attestation
      predicate format so sigil can carry them in signed attestation
      bundles alongside other per-transformation predicates.
    tags: [v0.3, sigil, attestation]
    fields:
      priority: must
      category: functional

  - id: REQ-017
    type: requirement
    title: Cross-run coverage aggregation (`witness merge`)
    status: draft
    description: >
      The system shall provide a `witness merge` subcommand that
      validates that multiple run JSON files share the same
      instrumented module and branch list, and emits a single merged
      run JSON with per-branch counters summed and `invoked` lists
      concatenated. Real test suites produce one run per test binary;
      rivet wants one coverage claim per requirement, so merging is
      load-bearing for v0.3 rivet integration.
    tags: [v0.3, runtime, aggregation]
    fields:
      priority: must
      category: functional

  - id: REQ-018
    type: requirement
    title: In-toto coverage predicate emission for sigil
    status: draft
    description: >
      The system shall emit an unwrapped in-toto Statement v1.0 with
      predicate type https://pulseengine.eu/witness-coverage/v1
      carrying the coverage report, measurement metadata, and the
      original module's digest. Sigil wraps and signs the Statement;
      witness produces the body only (out of the key-management
      business). Sigil reads the predicate type opaquely (no registry,
      no schema validation per type) so no sigil-side change is
      required.
    tags: [v0.3, sigil, attestation]
    fields:
      priority: must
      category: functional

  - id: REQ-019
    type: requirement
    title: Quality bar — property tests, mutation testing, miri
    status: draft
    description: >
      The system shall include property-based tests (proptest) on the
      load-bearing invariants — merge commutativity / monotonicity /
      sum-preservation, Manifest and RunRecord serde round-trips,
      RequirementMap flattening. The CI pipeline shall run cargo-mutants
      informationally on the main branch and miri on the pure-Rust
      modules to detect undefined behaviour. The codecov project
      threshold shall be 75% (patch 80%).
    tags: [v0.3, quality, testing]
    fields:
      priority: must
      category: non-functional

  - id: REQ-020
    type: requirement
    title: Branch-set / coverage delta subcommand
    status: draft
    description: >
      The system shall provide `witness diff --base <snapshot> --head
      <snapshot>` that computes added / removed / changed branches and
      a coverage-percentage delta when both inputs are run records.
      Required by the witness-delta.yml PR workflow.
    tags: [v0.4, cli, delta]
    fields:
      priority: must
      category: functional

  - id: REQ-021
    type: requirement
    title: Release-time compliance evidence bundle
    status: draft
    description: >
      The release workflow shall produce a tar.gz compliance evidence
      bundle containing the coverage report, in-toto predicates, and
      branch manifests, attached to the GitHub release alongside the
      binary archives. Implemented as a composite action at
      .github/actions/compliance modelled on rivet's equivalent.
    tags: [v0.4, ci, release, compliance]
    fields:
      priority: must
      category: functional

  - id: REQ-022
    type: requirement
    title: Coverage-delta PR workflow
    status: draft
    description: >
      The CI shall run a coverage-delta workflow on every PR that
      computes the witness diff between base and head, and posts the
      result as an artefact (and optionally a PR comment).
    tags: [v0.4, ci]
    fields:
      priority: must
      category: functional

  # -------------------------------------------------------------------------
  # v0.5 — variant-aware scope and pipeline integration (was v0.4)
  # -------------------------------------------------------------------------
  - id: REQ-009
    type: requirement
    title: Measure coverage at any pipeline stage
    status: draft
    description: >
      The system shall support measuring coverage on Wasm at any stage of
      the PulseEngine pipeline — post-rustc, post-meld fusion, post-loom
      optimization — with coverage reports scoped to the measurement point.
    tags: [v0.5, pipeline, variant]
    fields:
      priority: should
      category: functional

  - id: REQ-010
    type: requirement
    title: Interoperate with loom translation-validation output
    status: draft
    description: >
      When loom emits translation-validation evidence for a Wasm
      transformation, the system shall accept that evidence as a semantic
      equivalence proof between pre- and post-transformation modules, so
      coverage measurements across levels compose into a single audit
      argument.
    tags: [v0.5, loom, translation-validation]
    fields:
      priority: should
      category: functional

  - id: REQ-012
    type: requirement
    title: Component-model coverage support
    status: draft
    description: >
      The system shall measure coverage on Wasm component-model modules
      (not just core Wasm modules). Components wrap one or more core
      modules; instrumentation must either extract-instrument-recompose
      or operate on the component directly. Walrus does not currently
      support components well; the implementation may need to migrate to
      wasm-tools or Whamm (DEC-011).
    tags: [v0.5, component-model]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # v0.6 — real MC/DC truth tables, verdict suite, V-model traceability
  # -------------------------------------------------------------------------
  # NOTE: v0.6 is a redirect from the original "DWARF preservation through
  # loom + meld + component-model coverage" plan. v0.5 shipped branch
  # coverage with DWARF-grouped decisions but did NOT compute MC/DC truth
  # tables (the Report had only total/covered counts per branch). v0.6
  # closes that gap with real MC/DC: per-row condition vectors,
  # independent-effect citations, gap analysis with row-closure
  # recommendations, plus a verdict suite of canonical compound decisions
  # so MC/DC capability is demonstrable rather than asserted. The
  # original v0.6 scope (loom/meld DWARF, component-model) shifts to
  # v0.7+ pending the v0.7 scaling research output.
  - id: REQ-027
    type: requirement
    title: Per-decision MC/DC truth-table emission
    status: draft
    description: >
      The system shall emit, for each source-level Decision, a truth
      table recording every (decision, test-row) tuple's evaluated
      condition vector and decision outcome. Tables are deterministic
      and serialise as JSON under schema
      https://pulseengine.eu/witness-mcdc/v1. Conditions not evaluated
      under short-circuit semantics are recorded as NotEvaluated
      (distinct from True or False) per DEC-014.
    tags: [v0.6, mcdc, reporting]
    fields:
      priority: must
      category: functional

  - id: REQ-028
    type: requirement
    title: Independent-effect citation per condition
    status: draft
    description: >
      For each condition in each Decision, the report shall cite the
      specific test-row pair that proves the condition independently
      affects the decision outcome under either unique-cause or masking
      MC/DC (DO-178C accepted). When no such pair exists in the run,
      the report shall identify the condition as having an MC/DC gap
      and emit the row-closure recommendation per REQ-029.
    tags: [v0.6, mcdc, reporting]
    fields:
      priority: must
      category: functional

  - id: REQ-029
    type: requirement
    title: MC/DC gap analysis with row-closure recommendations
    status: draft
    description: >
      For every condition flagged in REQ-028 as having an MC/DC gap,
      the report shall name a specific condition vector that a new
      test row could provide to close the missing pair, plus the
      expected outcome under that vector. The recommendation must be
      consumable both by humans (one-line text) and by AI agents
      (structured JSON for autonomous test authorship per the v0.9
      agent-UX plan).
    tags: [v0.6, mcdc, reporting]
    fields:
      priority: must
      category: functional

  - id: REQ-030
    type: requirement
    title: Verdict suite as canonical MC/DC evidence
    status: draft
    description: >
      The witness repository shall ship a verdict suite of well-
      characterised compound boolean decisions covering 2-, 3-, 4-,
      and 5-condition shapes plus mixed AND/OR operators and a
      real-world Rust-crate anchor. Each verdict ships source,
      instrumented Wasm, manifest, two test-row sets (full-MC/DC-
      passing and deliberately-incomplete), run record, report, signed
      predicate, LCOV, and a one-page V-MODEL.md tracing requirement →
      design decision → conditions → rows → evidence.
    tags: [v0.6, verdict-suite, vmodel]
    fields:
      priority: must
      category: functional

  - id: REQ-031
    type: requirement
    title: witness-core.wasm shipped as a signed release asset
    status: draft
    description: >
      Each release shall ship a wasm32-wasip2 build of witness-core
      as a release asset, signed with the release-time DSSE key. The
      asset is the deployable component form of witness-core; sigil
      verification shall reproduce against the published verifying
      key. v0.5 built the wasm artefact in CI but did not ship it as
      a release asset; v0.6 closes that gap.
    tags: [v0.6, release, deployment]
    fields:
      priority: must
      category: functional

  - id: REQ-032
    type: requirement
    title: V-model traceability matrix in every release
    status: draft
    description: >
      The compliance evidence bundle shall include a traceability
      matrix in JSON and HTML, generated from rivet artefacts at
      release time, that traces every requirement through its
      satisfying features, supporting design decisions, verifying
      verdicts, test rows, and signed predicates. The matrix is
      reproducible from artifacts/*.yaml; no hand-curated traceability.
    tags: [v0.6, vmodel, compliance]
    fields:
      priority: must
      category: non-functional

  - id: REQ-033
    type: requirement
    title: Compliance bundle populated with real evidence
    status: draft
    description: >
      The .github/actions/compliance bundle shall contain real
      coverage reports, real run records, real signed predicates,
      and real branch manifests sourced from running the verdict
      suite at release time. v0.5 shipped a structural placeholder
      with empty predicates/ and manifests/ directories; v0.6
      replaces the placeholder with verdict-suite-derived evidence.
    tags: [v0.6, compliance, release]
    fields:
      priority: must
      category: functional

  # -------------------------------------------------------------------------
  # v0.6.1 — on-Wasm instrumentation runtime
  # -------------------------------------------------------------------------
  - id: REQ-034
    type: requirement
    title: On-Wasm trace-buffer instrumentation
    status: proposed
    description: >
      The system shall instrument Wasm modules with a linear-memory
      trace buffer (per
      docs/research/v06-instrumentation-primitive.md, primitive B)
      that records per-condition (decision_id, condition_index,
      evaluated_value) records under short-circuit semantics. The
      runner shall emit row-marker records between test invocations
      and parse the resulting trace into RunRecord.decisions. Closes
      the v0.6.0 gap where the consumer side (schema + reporter) is
      shipped but the instrumentation runtime is not.
    tags: [v0.6.1, mcdc, instrumentation]
    fields:
      priority: must
      category: functional

  # -------------------------------------------------------------------------
  # v0.7 — scaling MC/DC to real-application workloads
  # (provisional; research output at docs/research/v07-scaling-roadmap.md)
  # -------------------------------------------------------------------------
  - id: REQ-035
    type: requirement
    title: MC/DC at real-application scale
    status: proposed
    description: >
      The system shall produce correct, reviewable MC/DC reports for a
      destination workload of ~1500 decisions (initial pick:
      seanmonstar/httparse per the v0.7 research brief), within a
      bounded memory budget and CI-tractable runtime. Closes the gap
      between v0.6's curated 7-verdict suite and "MC/DC for a real
      Rust application".
    tags: [v0.7, scaling]
    fields:
      priority: must
      category: functional

  - id: REQ-036
    type: requirement
    title: Counter overflow prevention at scale
    status: proposed
    description: >
      The system shall use i64 saturating counters for per-condition
      hits and shall provide a streaming counter encoding mode for
      modules whose decision count exceeds the host's exported-globals
      cap. Property-based fuzz-test corpora must not be able to wrap
      counters in seconds.
    tags: [v0.7, scaling, instrumentation]
    fields:
      priority: must
      category: non-functional

  - id: REQ-037
    type: requirement
    title: BrTable per-row MC/DC reconstruction
    status: proposed
    description: >
      The system shall extend the per-row instrumentation to br_table
      dispatches, enabling MC/DC analysis for Rust pattern-match arms
      with guard expressions. Deferred from v0.6 (DEC-015).
    tags: [v0.7, mcdc, instrumentation]
    fields:
      priority: should
      category: functional

  # -------------------------------------------------------------------------
  # v0.8 — visualisation tooling
  # (provisional; research output at docs/research/v08-visualisation-roadmap.md)
  # NOTE: REQ-038 unsealed for v0.9.0 — visualiser implementation begins
  # this cycle (native Axum first per DEC-023; wasm32-wasip2 deferred).
  # -------------------------------------------------------------------------
  - id: REQ-038
    type: requirement
    title: Interactive visualisation of MC/DC truth tables
    status: approved
    description: >
      The system shall provide interactive visualisation of per-
      decision truth tables, condition independent-effect proofs,
      gap drill-down with copy-paste test stubs, and V-model
      navigation (REQ → DEC → decision → rows → signed evidence).
      Per-decision permalinks for citation in PR reviews.
    tags: [v0.8, visualisation]
    fields:
      priority: must
      category: functional

  - id: REQ-039
    type: requirement
    title: MCP server for MC/DC truth-table queries
    status: approved
    description: >
      The system shall expose an MCP (Model Context Protocol) server
      mounted on the visualisation Axum router with MC/DC-native
      tool calls (find_missing_witness, propose_test_row_to_close_gap,
      verify_gap_closed). The MCP surface is a strict subset of the
      REST+JSON HTTP surface so humans and agents see the same
      semantic model.
    tags: [v0.8, agent-ux, mcp]
    fields:
      priority: must
      category: functional

  - id: REQ-040
    type: requirement
    title: Visualiser is itself MC/DC-witnessed (dogfood)
    status: approved
    description: >
      The system's visualisation component shall be witnessed by
      witness itself, with Playwright-driven user-flow tests
      generating MC/DC-relevant decisions. Coverage threshold ratchet:
      ≥70% v0.8, ≥80% v0.9, ≥90% v1.0. The visualiser visualises
      its own coverage.
    tags: [v0.8, dogfood, vmodel]
    fields:
      priority: must
      category: non-functional

  # -------------------------------------------------------------------------
  # v0.9 — state-of-the-art positioning + autonomous AI-agent gap closure
  # (provisional; research output at docs/research/v09-soa-and-agent-ux.md)
  # NOTE: REQ-041..043 unsealed for v0.9.0 — implementation begins this
  # cycle alongside REQ-038..040 (visualiser + MCP server share scope).
  # -------------------------------------------------------------------------
  - id: REQ-041
    type: requirement
    title: Complete MC/DC for a high-complexity Rust application
    status: approved
    description: >
      The system shall produce reviewable, signed MC/DC evidence for
      a high-complexity Rust application identified per v0.7's
      destination workload selection. The evidence chain shall be
      reproducible from rivet artefacts and the source repository.
    tags: [v0.9, destination]
    fields:
      priority: must
      category: functional

  - id: REQ-042
    type: requirement
    title: Autonomous AI-agent gap-closing loop
    status: approved
    description: >
      The system shall support an autonomous AI-agent loop: agent
      reads gap report via MCP, proposes test rows via tool call,
      witness re-runs and verifies the gap actually closed before
      signing the new evidence. Agent attribution is recorded in
      the rivet V-model so test authorship is auditable.
    tags: [v0.9, agent-ux, autonomy]
    fields:
      priority: must
      category: functional

  - id: REQ-043
    type: requirement
    title: Superior PR-review experience vs incumbents
    status: approved
    description: >
      The system's PR-time review experience shall surpass LDRA /
      VectorCAST / Cantata / RapiCover on at least three axes:
      (1) inline truth-table rendering with row citations rather
      than coverage percentage, (2) tutorial-style gap explanations
      naming the exact missing condition vector, (3) cross-link
      navigation REQ → FEAT → DEC → decision → rows → signed
      predicate. Free under Apache-OR-MIT, where commercial
      competitors charge five-figure per-seat plus separate
      qualification kits.
    tags: [v0.9, positioning, ux]
    fields:
      priority: must
      category: non-functional

  # -------------------------------------------------------------------------
  # v1.0 — qualification under DO-330 via the Check-It pattern
  # -------------------------------------------------------------------------
  - id: REQ-011
    type: requirement
    title: Emit Check-It-pattern qualification artifact
    status: draft
    description: >
      The system shall emit a checkable coverage attestation containing
      sufficient information for a small, independently qualified checker
      to validate the coverage claim without re-running the instrumentation.
      The checker rather than the emitter is what requires DO-330
      qualification. Closes the soundness assumption stated by REQ-016.
    tags: [v1.0, qualification, do-330]
    fields:
      priority: must
      category: functional
