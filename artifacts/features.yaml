artifacts:
  - id: FEAT-001
    type: feature
    title: v0.1 — branch-level coverage on Wasm
    status: approved
    description: >
      CLI with instrument / run / report subcommands. Strict per-instruction
      counting at br_if (per-taken), if-else (per-arm), br_table (executed-
      only; per-target counting moved to FEAT-007 in v0.2). Embedded
      wasmtime runner. Counters exported as __witness_counter_<id>
      mutable globals. Shipped 2026-04-24 as v0.1.0.
    tags: [v0.1, shipped]
    fields:
      phase: phase-1
    links:
      - type: satisfies
        target: REQ-001
      - type: satisfies
        target: REQ-002
      - type: satisfies
        target: REQ-003
      - type: satisfies
        target: REQ-004

  - id: FEAT-002
    type: feature
    title: v0.2 — MC/DC condition decomposition via DWARF reconstruction
    status: draft
    description: >
      DWARF-informed reconstruction of source-level decisions from Wasm
      br_if sequences, producing MC/DC condition tables per decision.
      Strict per-br_if fallback when DWARF is absent (FEAT-001 behaviour).
      No artificial condition-count cap — supports decisions of any size.
      Soundness writeup is FEAT-009; per-target br_table is FEAT-007;
      subprocess harness is FEAT-006.
    tags: [v0.2, mcdc]
    fields:
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-005
      - type: satisfies
        target: REQ-006
      - type: satisfies
        target: REQ-015
      - type: refines
        target: FEAT-001

  - id: FEAT-006
    type: feature
    title: v0.2 — subprocess harness mode
    status: draft
    description: >
      Add `witness run --harness <cmd>` mode that spawns a user-supplied
      subprocess with WITNESS_MODULE / WITNESS_OUTPUT / WITNESS_MANIFEST
      env vars set, and merges the harness-written counter dump with the
      manifest. Escape hatch for non-wasmtime runtimes (browser-based
      tests, native test frameworks, wasi-preview2-only modules).
    tags: [v0.2, runtime]
    fields:
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-014

  - id: FEAT-007
    type: feature
    title: v0.2 — per-target br_table counting
    status: draft
    description: >
      Replace v0.1's single "executed" counter for br_table with one
      counter per target via a __witness_brtable_<id>(selector) helper-
      function-call pattern (DEC-008). When DWARF is present, each target
      is mapped to its source-level match arm.
    tags: [v0.2, instrumentation]
    fields:
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-013
      - type: refines
        target: FEAT-001

  - id: FEAT-009
    type: feature
    title: v0.2 — coverage-lifting paper
    status: draft
    description: >
      Short paper at docs/paper/v0.2-mcdc-wasm.md with: motivation
      (C-macro precedent + JaCoCo lateral), formal MC/DC at Wasm,
      reconstruction algorithm, coverage-lifting soundness argument,
      comparison with rustc-mcdc / Clang / wasmcov, regulatory framing.
      Cites arxiv:2409.08708 directly. Sources DO-178C post-preprocessor
      MC/DC clause.
    tags: [v0.2, research, paper]
    fields:
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-006
      - type: satisfies
        target: REQ-016

  - id: FEAT-003
    type: feature
    title: v0.3 — rivet and sigil integration
    status: draft
    description: >
      Coverage reports emitted in the witness-rivet-evidence/v1 schema
      consumed by the upstreamed rivet-core::coverage_evidence::CoverageStore;
      and as in-toto Statements with predicate type
      https://pulseengine.eu/witness-coverage/v1 consumed opaquely by
      sigil's existing DSSE bundle reader. New `witness merge` subcommand
      aggregates per-branch counters across multiple test-binary runs.
    tags: [v0.3, rivet, sigil]
    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-007
      - type: satisfies
        target: REQ-008
      - type: satisfies
        target: REQ-017
      - type: satisfies
        target: REQ-018

  - id: FEAT-010
    type: feature
    title: v0.3 — quality bar (proptest, mutants, miri)
    status: draft
    description: >
      Property-based tests via proptest on merge_records, serde
      round-trip of Manifest and RunRecord, RequirementMap flattening.
      cargo-mutants configured for the witness library, run as an
      informational CI job on main. miri job verifies UB-freedom on the
      pure-Rust modules (report, decisions, predicate). Coverage
      threshold raised to 75% project / 80% patch.
    tags: [v0.3, quality, testing]
    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-019

  - id: FEAT-011
    type: feature
    title: v0.4 — DWARF reconstruction + witness diff + compliance bundle
    status: draft
    description: >
      DWARF-grounded reconstruction algorithm body lifted from v0.2.1
      into v0.4: parse Wasm DWARF custom sections via gimli, build a
      (function, byte_offset) → (file, line) map, group br_if branches
      sharing a source line into Decisions. New `witness diff`
      subcommand for coverage / branch-set delta. New
      `witness-delta.yml` PR workflow. New `.github/actions/compliance`
      composite action attaches release-time evidence to GitHub
      releases. Mythos slop-hunt applied (orphan exports + unused deps
      removed).
    tags: [v0.4, mcdc, ci]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-005
      - type: satisfies
        target: REQ-006
      - type: satisfies
        target: REQ-016
      - type: satisfies
        target: REQ-020
      - type: satisfies
        target: REQ-021
      - type: satisfies
        target: REQ-022

  - id: FEAT-004
    type: feature
    title: v0.5 — variant-aware measurement across the pipeline (was v0.4)
    status: draft
    description: >
      Support post-cfg, post-meld, post-loom measurement points. Consume
      loom's translation-validation output to compose coverage across
      transformation layers. Component-model coverage.
    tags: [v0.5, pipeline]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-009
      - type: satisfies
        target: REQ-010
      - type: satisfies
        target: REQ-012

  - id: FEAT-012
    type: feature
    title: v0.6 — real MC/DC truth tables and verdict suite
    status: draft
    description: >
      Decision-level instrumentation primitive (Option C) emitting
      per-row condition vectors. Exact primitive (pattern-counters
      with reset vs linear-memory trace buffer with row markers)
      selected per DEC-013 following the v06-instrumentation-primitive
      research output. MC/DC reporter emits truth tables, independent-
      effect citations under unique-cause + masking variants, gap
      analysis with row-closure recommendations. Verdict suite ships
      seven canonical compound-decision shapes from 2 to 5 conditions
      across pure-AND, pure-OR, mixed operators, plus a real Rust
      crate anchor. Strict source-level short-circuit semantics
      preserved (DEC-014); BrTable MC/DC deferred to v0.7 (DEC-015).
    tags: [v0.6, mcdc]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-027
      - type: satisfies
        target: REQ-028
      - type: satisfies
        target: REQ-029
      - type: satisfies
        target: REQ-030
      - type: refines
        target: FEAT-002

  - id: FEAT-013
    type: feature
    title: v0.6 — witness-core.wasm signed release asset
    status: draft
    description: >
      Release pipeline builds witness-core to wasm32-wasip2, signs
      the .wasm binary with the release DSSE key, attaches the signed
      artefact and verification key fingerprint to the GitHub release
      alongside the existing platform binaries. Closes the v0.5 gap
      where the wasm artefact built in CI but never shipped as a
      release asset.
    tags: [v0.6, release, deployment]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-031

  - id: FEAT-014
    type: feature
    title: v0.6 — V-model traceability matrix and populated compliance bundle
    status: draft
    description: >
      Generate REQ → FEAT → DEC → verdict → evidence traceability
      matrix in JSON and HTML during release via `rivet trace`.
      Bundle into compliance evidence archive alongside real coverage
      reports, real run records, real signed predicates, and real
      branch manifests sourced from verdict-suite execution. Replaces
      v0.5's empty-bundle structural placeholder.
    tags: [v0.6, vmodel, compliance]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-032
      - type: satisfies
        target: REQ-033

  - id: FEAT-015
    type: feature
    title: v0.6.1 — on-Wasm trace-buffer instrumentation
    status: proposed
    description: >
      Implementation of the trace-buffer primitive recommended in
      docs/research/v06-instrumentation-primitive.md: exported
      `__witness_trace` linear memory, header-stored cursor and
      overflow flag, 8-byte fixed records carrying decision_id,
      condition_index, evaluated_value, record_kind. Helper exports
      `__witness_trace_reset`, `__witness_row_marker(u32)`,
      `__witness_trace_snapshot(out_ptr, out_len)`. Walrus-side
      rewrite for br_if and if-else; br_table retains v0.5 counter
      globals (DEC-015 v0.7 deferral).
    tags: [v0.6.1, instrumentation]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-034
      - type: refines
        target: FEAT-012

  - id: FEAT-016
    type: feature
    title: v0.7 — scaling architecture
    status: proposed
    description: >
      Streaming counter encoding for modules whose decision count
      exceeds host-exported-globals caps. i64 saturating counters.
      Inlined-subroutine handling in DWARF reconstruction (closes
      the v0.4 over-grouping gap for inlined hot paths). Auto-
      generated synthetic requirements (REQ-AUTO-<crate>-<file>) so
      hand-mapping is not required at 5k-decision scale. Module-
      rollup default report (per-branch wall is unreadable past
      ~100 decisions). Destination workload: seanmonstar/httparse.
    tags: [v0.7, scaling]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-035
      - type: satisfies
        target: REQ-036
      - type: satisfies
        target: REQ-037

  - id: FEAT-017
    type: feature
    title: v0.8 — Axum+HTMX wasm-component visualiser
    status: proposed
    description: >
      Witness-viz Axum router compiled to wasm32-wasip2 via
      wstd-axum, with maud server-side templating and HTMX 2.x
      bundled inline as include_bytes!. Runnable standalone via
      `wasmtime serve` or composed in-process via `wac plug`.
      Primary data path: read run-record.json from a --dir-mounted
      directory; WIT composition with witness-core deferred to
      v0.8.1. AI-agent surface = REST+JSON content-negotiation +
      MCP transport (rmcp::transport::streamable_http_server)
      mounted on the same Axum router; strict subset of HTTP
      tools, no MCP-private surface. Per-decision permalinks
      `/decision/<module>/<function>/<offset>` rendering
      uncapped condition counts. Gap drill-down emits copy-paste
      Rust test stubs. Playwright tests reuse rivet's pattern;
      visualiser visualises its own coverage as the v0.8 demo.
    tags: [v0.8, visualisation, agent-ux]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-038
      - type: satisfies
        target: REQ-039
      - type: satisfies
        target: REQ-040

  - id: FEAT-018
    type: feature
    title: v0.9 — autonomous agent gap-closing loop + signed attribution
    status: proposed
    description: >
      End-to-end agent-native MCP loop: agent reads gap report via
      MCP tool call, proposes test rows via structured tool input,
      witness re-runs and verifies gap actually closed before
      signing new evidence with sigil DSSE. Agent identity recorded
      in the rivet V-model trace as the test-row author so
      contributions are attributable. Plus the human-side ergonomics
      that make witness superior to LDRA/VectorCAST/Cantata/RapiCover
      on three axes (inline truth table, tutorial gap explanations,
      REQ→evidence cross-link navigation). Destination workload:
      complete MC/DC for the v0.7-selected real Rust application.
    tags: [v0.9, agent-ux, signed-attribution, positioning]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-041
      - type: satisfies
        target: REQ-042
      - type: satisfies
        target: REQ-043

  - id: FEAT-019
    type: feature
    title: v0.9 — witness-viz Axum visualiser
    status: proposed
    description: >
      Native Axum 0.8 + tokio 1 web server (port 3037) rendering MC/DC
      truth tables for a compliance bundle. Server-side HTML via raw
      format!() helpers (DEC-024); HTMX bundled inline as bytes with a
      v0.9.0 placeholder (DEC-025) so routes are HTMX-ready while full-
      page navigation remains the v0.9.0 fallback. Per-decision
      permalinks for citation in PR reviews. Standalone workspace at
      crates/witness-viz (DEC-026) so Axum/tokio compile artefacts do
      not bloat the parent workspace. wasm32-wasip2 build deferred to
      v0.9.x per DEC-023.
    tags: [v0.9, visualiser]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-038
      - type: satisfies
        target: REQ-040
      - type: refines
        target: FEAT-017

  - id: FEAT-020
    type: feature
    title: v0.9 — MCP server for MC/DC queries
    status: proposed
    description: >
      rmcp-based MCP transport mounted on the witness-viz Axum router
      (DEC-027) exposing MC/DC-native tools: get_decision_truth_table,
      find_missing_witness, list_uncovered_conditions. One binary, one
      port; the MCP surface is a strict subset of the HTTP API so
      humans and agents see the same semantic model. Supersedes the
      streamable_http_server transport hint in FEAT-017.
    tags: [v0.9, mcp, agent-ux]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-039
      - type: refines
        target: FEAT-017

  - id: FEAT-021
    type: feature
    title: v0.9 — truth-table-first PR review
    status: proposed
    description: >
      PR comment renders the truth table for each changed decision
      with missing-witness rows highlighted in tutorial style — the
      exact missing condition vector named, expected outcome stated,
      copy-paste-able test stub generated from the gap. Differentiates
      from LDRA / VectorCAST / Cantata / RapiCover whose PR surface
      is coverage percentages, not condition-vector evidence. Drives
      REQ-043 superiority axis (1) inline truth-table rendering with
      row citations.
    tags: [v0.9, review-experience]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-043

  - id: FEAT-022
    type: feature
    title: v0.9 — per-DWARF-inlined-context outcomes
    status: proposed
    description: >
      Extend kind=2 trace records with the inlined-subroutine id from
      DWARF so per-call outcomes are keyed by (function_index,
      inlined_id) rather than function_index alone. Closes the v0.7
      over-grouping gap (FEAT-016) where inlined hot paths shared a
      decision row across distinct call sites. Required for
      reviewable MC/DC at real-application scale (REQ-035) — without
      inlined-context keying, hot inlined helpers conflate
      independent-effect citations across unrelated callers.
    tags: [v0.9, instrumentation, dwarf]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-035
      - type: refines
        target: FEAT-016

  - id: FEAT-023
    type: feature
    title: v0.9 — visualiser self-coverage gate
    status: proposed
    description: >
      The witness-viz binary is itself instrumented under witness, and
      a Playwright suite drives user flows (load bundle, drill into
      decision, navigate REQ → DEC → row, query MCP tool) to generate
      MC/DC-relevant decisions. CI gate ratchets ≥70% MC/DC at v0.9.0,
      ≥80% at v0.9.x, ≥90% at v1.0 — the visualiser visualises its
      own coverage. Closes REQ-040 dogfood requirement.
    tags: [v0.9, dogfood]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-040
      - type: refines
        target: FEAT-017

  - id: FEAT-005
    type: feature
    title: v1.0 — Check-It qualification artifact
    status: draft
    description: >
      Coverage attestation emitted as a checkable artifact. DO-330
      qualification effort moves from "qualify witness" (infeasible) to
      "qualify a small independent checker" (tractable). Closes the
      soundness assumption stated by REQ-016 / DEC-010.
    tags: [v1.0, qualification]
    fields:
      phase: future
    links:
      - type: satisfies
        target: REQ-011
