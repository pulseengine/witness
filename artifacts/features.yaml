    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-048

  - id: FEAT-029
    type: feature
    title: v0.25 — viz pr-comment Markdown delta
    status: implemented
    description: >
      `witness viz-pr-comment --base <dir-or-report> --head
      <dir-or-report>` loads two report sets (a verdict-evidence
