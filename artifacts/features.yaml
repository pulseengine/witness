    links:
      - type: satisfies
        target: REQ-049
      - type: refines
        target: FEAT-024

  - id: FEAT-030
    type: feature
    title: v0.26 — multi-version Pages + pages-index
    status: implemented
    description: >
      The release `publish-pages` job auto-detects the last 3 release
      tags, downloads each release's compliance-evidence asset,
      renders each with the *current* witness-viz to `dist/<vX.Y.Z>/`,
