    status: implemented
    description: >
      Witness-viz Axum router compiled to wasm32-wasip2 via
      wstd-axum, with maud server-side templating and HTMX 2.x
      bundled inline as include_bytes!. Runnable standalone via
      `wasmtime serve` or composed in-process via `wac plug`.
      Primary data path: read run-record.json from a --dir-mounted
