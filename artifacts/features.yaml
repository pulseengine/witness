  # -------------------------------------------------------------------------
  # v0.31 — readable demangled function attribution
  # -------------------------------------------------------------------------
  - id: FEAT-035
    type: feature
    title: v0.31 — demangle function names in witness-core attribution
    status: implemented
    phase: phase-3
    acceptance-criteria:
      - "witness-core exposes a single `demangle` helper (rustc-demangle for Rust, cpp_demangle for C++, identity passthrough otherwise) used at the attribution site."
      - "Branch attribution carries a demangled display name in addition to the retained raw `function_name`; report JSON, LCOV, and rivet-evidence emit the demangled form."
      - "A unit test asserts `_ZN17verdict_leap_year12is_leap_year17h..E` → `verdict_leap_year::is_leap_year`, a `_Z`-style C++ symbol demangles, and a plain name passes through unchanged."
      - "witness-viz no longer needs its local demangle to get a readable name (the value already arrives demangled), though it may keep it as defense-in-depth."
    description: >
      Falsification-driven (v0.31 spike): the predicted feature
      'meld --remap + DWARF' was wrong on two counts — meld has no
      --remap (the flag is `meld fuse --preserve-names`), and names
      already flow end-to-end into witness when that flag is used.
      The real gap, found by running the pipeline on a fused leaf
      component: witness-core stores the RAW mangled symbol
      (instrument.rs:1618, `function_name = module.funcs.get(fid)
      .name.clone()`); only witness-viz demangles (data.rs:232), so
      `report`/`lcov`/`rivet-evidence`/`predicate` leak mangled
      names. This feature moves demangling to a shared witness-core
      helper applied once at the attribution site, retaining the raw
      symbol for attestation. rustc-demangle is already a workspace
      dep; cpp_demangle is already in Cargo.lock. Closes REQ-055.
    tags: [v0.31, demangle, attribution, reporting]
    links:
      - type: satisfies
        target: REQ-055

  # -------------------------------------------------------------------------
  # v0.32 — i64 overflow-safe hit counters
  # -------------------------------------------------------------------------
  - id: FEAT-036
    type: feature
    title: v0.32 — i64 overflow-safe hit counters
    status: implemented
    phase: phase-3
    acceptance-criteria:
      - "Each `__witness_counter_<id>` global is emitted as i64 and incremented with i64.add; brval/brcnt globals remain i32."
      - "A counter accumulates past i32::MAX without wrapping or sign-flipping; the host reads the full magnitude back (readback already handles Val::I64)."
      - "Existing MC/DC truth tables for a fixture are unchanged (widening adds no guest branch / control flow)."
      - "Unit test asserts the emitted counter global type is i64 and the increment opcode is i64.add."
    description: >
      Closes the counter-width clause of REQ-036 (DEC-039). The hit
      counter was an i32 incremented with i32.add — wrapping at 2^32
      and sign-flipping past i32::MAX when read back, silently
      misreporting coverage on hot branches at real-application scale.
      Widening to i64 aligns the wasm representation with the already-
      u64 report side and pushes the wrap bound to an unreachable 2^64.
      Two surgical edits in instrument.rs (counter global type + init,
      and the increment sequence); no new control flow. The streaming
      counter-encoding mode (REQ-036 second clause) and a true
      saturation guard are deliberately out of scope (DEC-039).
    tags: [v0.32, scaling, instrumentation, counters]
    links:
      - type: satisfies
        target: REQ-036
      - type: implements
        target: DEC-039

  # -------------------------------------------------------------------------
  # v0.33 — sound br_table MC/DC verdict
  # -------------------------------------------------------------------------
  - id: FEAT-038
    type: feature
    title: v0.33 — sound br_table MC/DC verdict (bit-audit, not arm-hits)
    status: implemented
    phase: phase-3
    acceptance-criteria:
      - "A br_table arm is no longer reported as MC/DC-'proved' merely because hits>0; a single observed discriminant yields a non-full (Gap/Partial) verdict for that decision."
      - "The br_table decision's MC/DC status is derived from the existing bit-level br_table_audit (per-bit independent-effect)."
      - "The mcdc text report surfaces the bit-level audit (bit_width, per-bit status, witness discriminant pairs)."
      - "Falsifying oracle: a single-discriminant run over a match→br_table fixture does NOT show the arm as Proved (it does today); full-discriminant coverage proves the observed bits."
    description: >
      Closes REQ-037 and fixes a soundness bug (DEC-041). The per-arm
      verdict marked an arm Proved iff executed once (hits>0), with no
      independent-effect pair — false MC/DC. The sound bit-level audit
      (derive_br_table_audit) was already computed but unused by the
      verdict/report. This feature wires the audit into the decision
      verdict and surfaces it, so br_table dispatch gets genuine MC/DC
      evidence (or an honest Gap) instead of branch coverage mislabeled
      as "proved."
    tags: [v0.33, mcdc, br_table, soundness]
    links:
      - type: satisfies
        target: REQ-037
      - type: implements
        target: DEC-041

