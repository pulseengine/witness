      fixtures use. New user goes from `cargo witness new` to a
      verified compliance bundle without learning the per-stage flag
      surface. Level-B integration; Level A (the `cargo witness`
      alias shim) shipped earlier in the same window.
    tags: [v0.23, cli, ergonomics]
    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-047

  - id: FEAT-028
    type: feature
    title: v0.23 — V3 source-map fallback for DWARF-less languages
    status: implemented
    description: >
      witness-core now reads V3 source maps (.wasm.map sidecars,
      TC39-compatible) as a fallback source-line attribution backend
