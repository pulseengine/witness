  - id: FEAT-024
    type: feature
    title: v0.23 — static MC/DC dashboard export
    status: implemented
    description: >
      `witness viz-export --reports-dir <…> --out <…>` walks every
      page of the witness-viz dashboard through the pure renderer
      (DEC-028) and writes self-contained static HTML browseable
      from `file://`, deployable to GitHub Pages or any static host.
      Output tree: `out/index.html`,
      `out/verdict/<name>.html`, `out/decision/<verdict>/<id>.html`,
      `out/gap/<verdict>/<id>/<cond>.html`, `out/_assets/styles.css`,
      `out/summary.json`. Depth-aware relative links; no HTMX, no
      API endpoints in the dump. Release workflow auto-publishes
      the canonical verdict-evidence dashboard to
      https://pulseengine.github.io/witness/ on every `v*` tag
      (DEC-029).
    tags: [v0.23, viz, export]
    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-044
      - type: refines
        target: FEAT-019

  - id: FEAT-025
    type: feature
    title: v0.24 — source visibility in viz dashboard
    status: implemented
    description: >
      Decision and Gap pages of the static dashboard render the
      underlying source code inline (±5 lines around the recorded
      source_line, source_line highlighted, plain `<pre>`) plus a
      "view full file" link to a syntax-highlighted full source
      file at `out/source/<encoded-path>.html` with `#L<line>` deep
      anchors. New CLI flag `witness viz-export --source-root
      <repo-root>` for the export driver to locate the source files.
      Closes REQ-045 — the "what code am I looking at?" gap that
      v0.23 left open.
    tags: [v0.24, viz, source, pr-review]
    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-045
      - type: refines
        target: FEAT-024

  - id: FEAT-026
    type: feature
    title: v0.22 — release-artefact standardisation per org-wide brief
    status: implemented
    description: >
      Every tagged release ships the asset set the org-wide
      release-artefact brief mandates: per-platform binary archives
      with cosign `.cert` + `.sig` (certification evidence kept from
      witness's prior practice), a CycloneDX 1.5 SBOM
      (witness-X.Y.Z.cdx.json), a SHA256SUMS.txt with the cosign
