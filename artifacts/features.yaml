      the brief; the brief otherwise specifies only sums-file
      signing.
    tags: [v0.22, release, supply-chain]
    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-046

  - id: FEAT-027
    type: feature
    title: v0.23 — `cargo witness all` end-to-end pipeline subcommand
    status: implemented
    description: >
      Single `witness all` / `cargo witness all` invocation runs the
      entire pipeline — instrument → run → report → predicate →
