artifacts:
  - id: DEC-001
    type: design-decision
    title: Use walrus for Wasm AST rewriting in v0.1
    status: approved
    description: >
      walrus provides an ergonomic mutate-and-serialize API for the Wasm
      module structure, and is maintained under the Rust-and-WebAssembly
      Working Group.
    rationale: >
      v0.1 needs to move fast; walrus has the cleanest high-level mutation
      API in the Rust Wasm ecosystem. Qualifying a lower-level alternative
      now would cost weeks we do not yet need to spend.
    alternatives: >
      wasm-tools (lower-level, tracks the current spec more tightly); writing
      raw bytes against wasmparser. Both were considered; walrus wins on
      ergonomics for the v0.1 scope. Revisit if walrus falls out of
      maintenance or wasm-tools gains higher-level mutation ergonomics.
      v0.2 keeps walrus; DEC-011 documents the v0.3 backend re-evaluation.
    tags: [v0.1, architecture]
    links:
      - type: satisfies
        target: REQ-001

  - id: DEC-002
    type: design-decision
    title: v0.1 reports strict per-instruction branch coverage, not MC/DC
    status: approved
    description: >
      v0.1 counts each br_if (taken path) and each if-else arm as a
      separate decision; br_table is counted as a single "executed" point
      (per-target counting is DEC-008 in v0.2). This is NOT MC/DC in the
      condition-decomposition sense; it is branch coverage.
    rationale: >
      The condition-decomposition work depends on DWARF-in-Wasm parsing
      and is scoped to v0.2. Shipping strict coverage first gets empirical
      grounding behind the variant-pruning argument without blocking on
      DWARF tooling maturity. Each layer of ambition ships independently.
      JaCoCo (JVM bytecode branch coverage, no MC/DC) is the precedent —
      branch coverage at bytecode is a shipped, accepted pattern.
    alternatives: >
      Block v0.1 on DWARF-informed reconstruction — rejected as too slow.
      Emit only condition-level coverage without branch-level — rejected
      because branch-level is useful on its own and simpler to qualify.
    tags: [v0.1, mcdc, scope]
    links:
      - type: satisfies
        target: REQ-003
      - type: constrained-by
        target: REQ-005

  - id: DEC-003
    type: design-decision
    title: Counter strategy — exported mutable globals (no dump function)
    status: approved
    description: >
      Instrumented module allocates one mutable i32 global per branch
      point and exports each as `__witness_counter_<id>`. Hosts iterate
      module exports and read every global whose name matches the prefix.
      No dump function, no linear-memory serialisation, no multi-value
      return.
    rationale: >
      No host cooperation required during execution — works with any
      runtime that exposes Wasm globals (every conformant runtime does).
      Minimal performance overhead in the hot path (one i32 increment per
      branch hit). Simpler than the original DESIGN.md plan
      (__witness_dump_counters function writing to linear memory) by
      eliminating the serialisation contract between module-under-test
      and harness. The exported-global mechanism is what enables FEAT-001
      to ship without a cooperation protocol.
    alternatives: >
      Exported __witness_dump_counters function with linear-memory dump
      (the original DESIGN.md plan) — rejected for v0.1 because it adds
      a serialisation contract harnesses must implement. Host-imported
      counter function (Wasm calls into host for each branch) — rejected
      because it requires every runtime to cooperate. Memory-resident
      counter table with host-visible offset — possible but more fragile
      under linear-memory growth.
    tags: [v0.1, instrumentation]
    links:
      - type: satisfies
        target: REQ-001
      - type: satisfies
        target: REQ-004

  - id: DEC-004
    type: design-decision
    title: Runtime choice — embed wasmtime for v0.1; subprocess harness in v0.2
    status: approved
    description: >
      v0.1 embeds wasmtime as the run-phase runtime. The runner instantiates
      the instrumented module, invokes user-specified no-argument exports,
      and reads back the counter globals. v0.2 adds a `--harness <cmd>`
      escape hatch (DEC-009) for runtimes the embedded wasmtime cannot
      cover.
    rationale: >
      The Rust Wasm ecosystem (cargo test --target wasm32-wasip1)
      integrates most cleanly with wasmtime. Embedding wasmtime as a
      library lets witness extract counters via instance.get_global
      directly — no cooperation protocol required. v0.1 does not need
      subprocess-harness mode to be useful; defer it as the v0.2 escape
      hatch.
    alternatives: >
      Subprocess-harness as the v0.1 default (the original DESIGN.md
      plan) — rejected because it adds harness-side cooperation
      complexity for the common case. Bundle kiln directly — rejected
      because it couples witness to a specific runtime. Build our own
      minimal runtime — out of scope.
    tags: [v0.1, runtime]
    links:
      - type: satisfies
        target: REQ-002

  - id: DEC-005
    type: design-decision
    title: Complementary to Rust-level MC/DC, not a replacement
    status: approved
    description: >
      When Ferrous/DLR Rust-level MC/DC tooling lands under the SCRC
      2026 Rust Project Goal, witness does not become obsolete.
    rationale: >
      Different measurement points have different blind spots; translation
      validation bridges them; coverage at both levels is additive evidence
      consistent with DO-178C's dual source/object-code coverage discipline
      since 1992. The overdo principle — adopt both, do not pick one —
      applies. Framing witness as competitive would be a category error.
      The Wasm measurement point catches post-LLVM optimisation effects
      that source-level rustc-mcdc cannot see; rustc-mcdc catches source-
      level decisions on code paths that may not survive lowering.
    alternatives: >
      Position witness as "the" MC/DC-for-Rust story, waiting for
      Ferrous/DLR to become irrelevant — rejected because the Rust-level
      tool catches source-level bugs witness cannot see; they compose
      rather than compete.
    tags: [architecture, ecosystem]
    links:
      - type: satisfies
        target: REQ-005
      - type: satisfies
        target: REQ-015

  - id: DEC-006
    type: design-decision
    title: Decision-granularity at Wasm level — strict default, DWARF refinement
    status: draft
    description: >
      Short-circuit evaluation at Rust source (a && b && c) compiles to
      a sequence of br_if instructions. MC/DC's condition-independence
      requirement needs a grouping rule to reconstruct source-level
      decisions from br_if sequences. v0.1 uses strict per-br_if; v0.2
      adds DWARF-grounded reconstruction with strict as the fallback
      (DEC-010 documents the soundness argument).
    rationale: >
      Two honest interpretations exist. Strict per-br_if is straightforward
      to implement, easy to qualify, and is what v0.1 ships. DWARF-informed
      reconstruction preserves the source-level condition concept and
      maps more cleanly onto pre-Wasm MC/DC practice. v0.2 implements
      both with strict as the fallback; the reconstruction algorithm
      and its soundness argument are FEAT-009.
    alternatives: >
      Adopt Ferrous/DLR's Rust-source mapping directly — rejected because
      it requires mapping back through rustc's lowering, which is the hard
      problem their paper is solving. Mandate an explicit grouping token
      at the source (compiler attribute or proc-macro) — rejected as too
      invasive on user code.
    tags: [research, mcdc]
    links:
      - type: satisfies
        target: REQ-006

  - id: DEC-012
    type: design-decision
    title: v0.2.0 ships the Decisions schema; reconstruction algorithm lands in v0.2.1
    status: draft
    description: >
      v0.2.0 ships the Manifest schema additions for DWARF-grounded MC/DC
      (BranchEntry.byte_offset, Manifest.decisions: Vec<Decision>) and a
      stub `decisions::reconstruct_decisions` that returns an empty list.
      The reconstruction algorithm body lands in v0.2.1.
    rationale: >
      The schema is the durable interface — once a Manifest is written,
      hosts (rivet, CI) parse it forever. Locking schema in v0.2.0 means
      v0.2.1's reconstruction output is forward-compatible without a
      schema bump. The reconstruction algorithm itself is the most
      complex piece of v0.2 (DWARF parsing, line-info correlation, edge
      cases for macro expansion and inlining) and would block the
      release indefinitely if treated as v0.2.0-blocking. The strict
      per-br_if fallback (already shipped in v0.1) remains the default
      until v0.2.1 fills the stub.
    alternatives: >
      Block v0.2.0 on the full algorithm — rejected as scope creep that
      would defer all of v0.2's other deliverables (subprocess harness,
      per-target br_table, paper). Skip the schema in v0.2.0 and bump
      again in v0.2.1 — rejected because hosts would need to handle two
      schema versions.
    tags: [v0.2, scope]
    links:
      - type: satisfies
        target: REQ-005
      - type: refines
        target: DEC-006

  - id: DEC-007
    type: design-decision
    title: Reject the LLVM 6-condition cap; support unbounded MC/DC decisions
    status: draft
    description: >
      Witness shall NOT inherit the 6-condition-per-decision limit that
      Clang's source-based MC/DC and rustc's `-Zcoverage-options=mcdc`
      enforce. Decisions of any size are supported.
    rationale: >
      The 6-cap exists because LLVM encodes condition combinations as
      integers in [0, 2^N) and stores them in a fixed-size bitmap. Witness
      uses exported i32 globals — no bitmap, no encoder constraint, no
      reason to inherit the cap. This is positioning: witness covers
      decisions rustc-mcdc cannot, which is real differentiation under
      the overdo stance (DEC-005).
    alternatives: >
      Mirror LLVM's cap for compatibility with the rustc-mcdc report
      format — rejected because the formats are not unified anyway
      (witness emits its own JSON; cross-tool merging is a v0.3 rivet
      problem). Cap at a higher value (16, 32) — rejected as arbitrary.
    tags: [v0.2, mcdc, differentiation]
    links:
      - type: satisfies
        target: REQ-015
      - type: depends-on
        target: DEC-003

  - id: DEC-008
    type: design-decision
    title: Per-target br_table via helper-function-call pattern
    status: draft
    description: >
      v0.2 replaces v0.1's single "executed" br_table counter with one
      counter per target. The instrumentation calls a synthetic
      __witness_brtable_<id>(selector: i32) -> i32 helper that increments
      counter[id][selector] and returns the selector unchanged for the
      following br_table.
    rationale: >
      Two implementations were considered: (a) inline i32.eq chain with
      one if/incr per target — O(N) instructions per N-target table,
      excessive for large tables; (b) helper-function call — O(1) per
      branch, plus a single helper per br_table site. Chose (b) because
      Rust pattern-match tables can be wide (default 8-bit selectors
      hit 256 targets). The helper is generated in the same pass as
      counter allocation; per-target count comes from the br_table's
      target list.
    alternatives: >
      Inline i32.eq + if/incr chain — rejected for size cost. One global
      per (br_table, target) pair without a dispatcher — would require
      static analysis to determine selector at instrumentation time,
      which we cannot do.
    tags: [v0.2, instrumentation]
    links:
      - type: satisfies
        target: REQ-013

  - id: DEC-009
    type: design-decision
    title: Subprocess harness mode — file-based handshake via env vars
    status: draft
    description: >
      v0.2 ships `--harness <cmd>` that spawns a subprocess with three
      environment variables: WITNESS_MODULE (path to instrumented .wasm),
      WITNESS_MANIFEST (path to .witness.json), WITNESS_OUTPUT (path
      where the harness writes its counter snapshot before exiting).
      Witness joins the harness output with the manifest after the
      subprocess returns.
    rationale: >
      File-based handshake is portable across all platforms and host
      languages. Avoids stdin/stdout coupling (the harness may want
      stdout for test output). Avoids a socket / RPC contract that
      would lock the protocol to specific runtimes. The harness's only
      cooperation cost is "read all __witness_counter_* globals at the
      end of the test run and write a JSON file" — small enough to
      ship as a witness-harness companion crate (v0.3) for ergonomic
      consumption.
    alternatives: >
      stdout-based handshake (harness writes counter JSON to stdout) —
      rejected because it conflicts with test-runner stdout output.
      Unix socket / named pipe — rejected as not portable (Windows).
      Pre-registered HTTP endpoint — rejected as overkill.
    tags: [v0.2, runtime]
    links:
      - type: satisfies
        target: REQ-014
      - type: refines
        target: DEC-004

  - id: DEC-010
    type: design-decision
    title: Coverage-lifting via witness-and-checker, not direct soundness proof
    status: draft
    description: >
      v0.2 ships the coverage-lifting argument as a witness-and-checker
      construction: the DWARF metadata IS the witness (the assertion that
      this br_if sequence corresponds to that source decision), and a
      future small qualified checker (v1.0, REQ-011) verifies the witness
      matches the structure. The soundness claim is conditional on the
      DWARF assertion being correct.
    rationale: >
      Direct soundness proof — "rustc + LLVM at optimisation level X
      preserves the independence-of-condition relation" — is hard and
      would block v0.2 indefinitely on rustc-internal correctness work.
      The witness-and-checker variant is tractable: trust DWARF for now,
      qualify the checker that consumes it later. This matches the
      overdo-blog Check-It pattern (constraint C1 in
      docs/research/overdo-alignment.md).
    alternatives: >
      Block v0.2 on a direct soundness proof — rejected as scope creep.
      Skip the soundness argument entirely — rejected because the v0.2
      paper needs it for regulatory framing. Adopt translation
      validation per-decision via Z3 — interesting; deferred as a v0.4
      track aligned with loom's TV work.
    tags: [v0.2, mcdc, research]
    links:
      - type: satisfies
        target: REQ-016
      - type: depends-on
        target: REQ-011

  - id: DEC-013
    type: design-decision
    title: MC/DC instrumentation primitive — linear-memory trace buffer with row markers
    status: draft
    description: >
      v0.6 instruments br_if and if-else decisions with appends to a
      linear-memory trace buffer. Each append writes a fixed-size
      record carrying decision_id, condition_branch_id, and the
      evaluated boolean. The wasmtime runner emits row-marker records
      between test invocations; the reporter parses the trace into
      DecisionRow entries with sparse `evaluated` maps. br_table
      retains v0.5's per-target counter globals (DEC-015 defers
      br_table MC/DC to v0.7). Trace-buffer size is bounded; overflow
      is recorded in a trace_health field on RunRecord and causes the
      reporter to refuse MC/DC verdicts on affected decisions
      (safety-critical conservative default). Full design at
      docs/research/v06-instrumentation-primitive.md.
    rationale: >
      Trace-buffer with row markers preserves Rust source-level
      short-circuit semantics natively — short-circuited conditions
      are simply absent from the row's sparse evaluated map, no
      eager-evaluation emulation required. Pattern-counter primitive
      would force evaluation of all conditions per invocation and
      cannot tell "condition was F" from "condition was not reached"
      without an additional per-condition evaluated flag, growing the
      counter footprint to 4^N. Trace-buffer is what every cited
      safety-critical tool uses: LDRA TBmanager records branch-
      condition pairs to a trace, VectorCAST/MCDC writes
      decision-row events to a per-test log, Cantata's branch-
      condition recording is structurally identical, and gcov 14+'s
      pending -fmcdc patch follows the same pattern. The choice also
      aligns with the v0.8 Axum+HTMX UI which can render the trace
      stream directly without an intermediate transformation.
    alternatives: >
      Pattern-counter+reset (Option A): simpler instrumentation but
      requires eager evaluation (semantic violation for side-effecting
      conditions per DEC-014) plus reset-snapshot machinery in the
      runner; rejected. Hybrid pattern-counter for ≤4-cond decisions
      plus trace-buffer for larger ones: rejected as unnecessary
      complexity — trace-buffer scales adequately for v0.6 verdict
      sizes (max 5 conditions in safety_envelope). Per-condition
      tee-and-record into globals: rejected because globals do not
      preserve row identity without per-row reset.
    tags: [v0.6, mcdc, instrumentation]
    links:
      - type: satisfies
        target: REQ-027
      - type: refines
        target: DEC-006

  - id: DEC-014
    type: design-decision
    title: Short-circuit semantics preserved by instrumentation
    status: draft
    description: >
      Witness instrumentation shall not force evaluation of conditions
      that the source-level operator would short-circuit. Conditions
      that were not evaluated in a given test row are recorded as
      NotEvaluated (distinct from True or False) in the per-row
      condition vector. The MC/DC reporter accepts partial vectors
      via masking-MC/DC analysis (DO-178C accepted variant since 1992).
    rationale: >
      Forcing eager evaluation would change observable behaviour for
      any condition with side effects — violates REQ-004 semantic
      preservation invariant. Masking MC/DC produces valid
      independent-effect proofs from partial-evaluation vectors and
      is the standard regulatory accept under DO-178C; choosing
      unique-cause MC/DC exclusively would make many real-world
      decisions unprovable. The RunRecord per-row schema carries the
      NotEvaluated marker explicitly so reporters can distinguish
      "condition was F" from "condition was not reached".
    alternatives: >
      Eager evaluation with side-effect-free assumption — rejected
      because we cannot statically determine side-effect freedom across
      arbitrary Rust conditions; even pure conditions may have type-
      conversion observability. Per-condition "evaluated" flag in
      addition to T/F — same effect via more complex schema; rolled
      into a single tri-state NotEvaluated/T/F. Unique-cause-only
      MC/DC — rejected as too restrictive for real-world decisions.
    tags: [v0.6, mcdc, instrumentation, semantics]
    links:
      - type: satisfies
        target: REQ-027
      - type: refines
        target: REQ-004

  - id: DEC-015
    type: design-decision
    title: BrTable MC/DC deferred to v0.7
    status: draft
    description: >
      v0.6 emits per-row data only for br_if and if-else decisions.
      br_table dispatches remain branch-coverage-only, retaining the
      per-target hit counters from v0.2 / DEC-008 unchanged. MC/DC
      analysis for table dispatch lands in v0.7 alongside the scaling
      work, where real-world workloads will surface the table-dispatch
      patterns we need to model correctly.
    rationale: >
      br_table's source-level analogue is the Rust `match` expression
      with potential guard expressions per arm. The MC/DC interpretation
      conflates "arm taken" with "guard expressions evaluated"; modelling
      this correctly requires DWARF-driven guard reconstruction which
      is non-trivial and not on the v0.6 critical path. The verdict
      suite (REQ-030) demonstrates MC/DC capability without table
      dispatch; deferring keeps v0.6 scope tractable while leaving
      v0.7 a natural home for the work alongside scaling research.
    alternatives: >
      Block v0.6 on table-dispatch MC/DC — rejected as scope creep that
      would defer the core MC/DC delivery. Approximate br_table MC/DC
      by treating it as N independent conditions — rejected because
      it misrepresents source-level semantics; emitting nothing is
      better than emitting wrong evidence. Defer to v1.0 — rejected
      because the v0.7 scaling work naturally surfaces table-dispatch
      patterns from real workloads.
    tags: [v0.6, mcdc, instrumentation, scope]
    links:
      - type: satisfies
        target: REQ-027
      - type: refines
        target: DEC-008

  - id: DEC-016
    type: design-decision
    title: Verdict suite composition — canonical compound-decision shapes
    status: draft
    description: >
      The v0.6 verdict suite covers seven shapes: leap_year (3-cond
      mixed AND/OR — textbook MC/DC example), range_overlap (2-cond
      AND — minimal compound), triangle (Myers-paper classifier),
      state_guard (4-cond AND chain), mixed_or_and (4-cond nested
      operators (a||b)&&(c||d)), safety_envelope (5-cond scaling
      case beyond LLVM's 6-condition cap), parser_dispatch (real
      Rust crate anchor — non-synthetic).
    rationale: >
      Each verdict probes a distinct shape of source-level decision
      so downstream consumers can verify witness's MC/DC report
      against a hand-derivable expected truth table. Shapes were
      chosen for coverage of: condition count from minimal to
      scaling-stress; operator mix from pure-AND through mixed
      precedence to mixed nesting; synthetic for reproducibility plus
      a real-world anchor for credibility. Seven is the number that
      controls every shape called out in the v0.6 plan; fewer leaves
      shape gaps; more dilutes attention without adding shape
      coverage.
    alternatives: >
      Smaller suite (3-4 verdicts) — rejected after explicit user
      direction to include all shapes for control. Larger suite (10+)
      — no additional shape coverage; would dilute attention.
      Synthetic-only — rejected because parser_dispatch's real-world
      anchor is needed for credibility against state-of-the-art
      tools (per v0.9 superiority brief).
    tags: [v0.6, verdict-suite, vmodel]
    links:
      - type: satisfies
        target: REQ-030

  - id: DEC-017
    type: design-decision
    title: V-model traceability matrix as release asset
    status: draft
    description: >
      Every release shall include a JSON+HTML traceability matrix
      generated by `rivet trace` from artifacts/*.yaml at release
      time, bundled in the compliance archive. The matrix traces
      every requirement through satisfying features, supporting
      design decisions, verifying verdicts, test rows, and signed
      predicates. No hand-curated traceability — single source of
      truth is the rivet artefact graph.
    rationale: >
      V-model evidence must be reproducible and auditable.
      Generating from rivet at release time eliminates drift between
      artefacts and prose claims. Compliance-archive bundling under
      DSSE signature makes the matrix immutable for downstream
      audit. This closes the user concern that without provable
      V-model usage and knowledge, nothing else helps.
    alternatives: >
      Maintain a separate hand-written traceability document —
      rejected because it drifts from the artefact graph. Skip the
      matrix and rely on rivet ad-hoc inspection — rejected because
      the compliance archive needs to be self-contained for offline
      audit (no rivet binary required to read evidence).
    tags: [v0.6, vmodel, compliance]
    links:
      - type: satisfies
        target: REQ-032

  - id: DEC-018
    type: design-decision
    title: Compliance bundle populated by verdict-suite execution
    status: draft
    description: >
      .github/actions/compliance shall execute the verdict suite
      (instrument → run → report → predicate → attest → lcov →
      rivet-evidence) during release and bundle the resulting
      artefacts into the compliance evidence archive. v0.5's empty-
      bundle structural placeholder is replaced with real evidence.
    rationale: >
      The bundle is the showable proof of every release. Empty
      directories are an admission that the release has nothing to
      show; real artefacts make the V-model claim auditable. Cost is
      bounded: the verdict suite is intentionally small (7 verdicts),
      total CI overhead per release is minutes not hours.
    alternatives: >
      Keep the bundle empty as a structural placeholder — rejected
      after explicit user direction. Generate dummy predicates —
      rejected because they would be misleading in audit. Run only
      a subset of verdicts in compliance bundle — rejected because
      then the bundle is non-deterministic; deterministic full-suite
      execution is the right behaviour.
    tags: [v0.6, release, compliance]
    links:
      - type: satisfies
        target: REQ-033

  - id: DEC-019
    type: design-decision
    title: v0.7 destination workload — seanmonstar/httparse
    status: proposed
    description: >
      v0.7's scaling target is seanmonstar/httparse — RFC 7230
      parser, ~1500 decisions, clean wasm32-wasip2 build (no
      ring/native deps), real test suite, shipped via hyper into
      much of the Rust web stack. Backups: wasmparser (5k-decision
      density stress test), witness-core itself (dogfood + rivet
      integration test). Rejected: rustls (ring's wasm32 support
      is partial as of 2026-04 per rustls #808).
    rationale: >
      httparse is the right scaling middle-ground: substantial
      enough to stress witness's machinery (1500 decisions, real
      compound boolean logic), simple enough that a coverage gap
      is reviewable by hand, and shipped through hyper so any
      coverage there has supply-chain leverage. v0.9's "high-
      complexity" workload selection happens at v0.7 close,
      informed by what httparse exposed.
    alternatives: >
      Choose rustls for v0.7 — rejected due to ring's partial
      wasm32 support. Choose tokio core for v0.7 — likely too much
      native I/O abstraction. Build a synthetic 1500-decision
      torture test — rejected because real-world workloads expose
      patterns synthetic tests miss.
    tags: [v0.7, destination]
    links:
      - type: satisfies
        target: REQ-035

  - id: DEC-020
    type: design-decision
    title: v0.8 visualisation architecture — wstd-axum + maud + HTMX
    status: proposed
    description: >
      v0.8 ships witness-viz as an Axum Router compiled to
      wasm32-wasip2 via wstd-axum (https://docs.rs/wstd-axum/),
      runnable standalone via `wasmtime serve` or composed
      in-process via `wac plug`. Server-side templating with
      maud (avoids the format!-string maintenance pain rivet's
      serve module exhibits at 5908 lines). HTMX 2.x bundled
      inline as include_bytes! — same pattern rivet uses for
      its inline htmx.min.js. Primary data path: read
      run-record.json from a --dir-mounted directory.
    rationale: >
      Three constraints forced the choice. (1) The visualiser
      must be deployable as a Wasm component for the v0.6 "the
      deployable IS the wasm component" thesis to extend to
      tooling. wstd-axum is the only path to Axum on wasm32-wasip2
      that's currently maintained. (2) Server-side templating
      beats client-side rendering for accessibility and for
      auditable HTML evidence (the rendered page is itself a
      coverage-evidence artefact). (3) HTMX preserves a single
      mental model: server emits HTML fragments, client swaps
      them in — no separate API surface to keep in sync with
      the UI. The MCP transport (rmcp::transport::
      streamable_http_server) mounts on the same Axum router so
      humans and agents see the same semantic model.
    alternatives: >
      Yew or Leptos with WASM client-side rendering — rejected:
      the visualiser would be its own Wasm component AND the
      page contents would be opaque to non-Wasm consumers (curl
      pulls JSON, not the rendered evidence). Native Axum (no
      wasm component target) — rejected: breaks the deployable-
      component thesis. Static-HTML report generator — rejected:
      lacks interactivity needed for gap drill-down and per-
      decision navigation.
    tags: [v0.8, visualisation, architecture]
    links:
      - type: satisfies
        target: REQ-038
      - type: satisfies
        target: REQ-039

  - id: DEC-021
    type: design-decision
    title: v0.9 superiority axes — Rust+Wasm+signed+agent-native
    status: proposed
    description: >
      v0.9 positions witness against LDRA, VectorCAST, Cantata,
      BullseyeCoverage, Squore, gcov+gcovr, and RapiCover on
      three superiority axes: (1) MCP server with MC/DC-native
      tool calls (find_missing_witness, propose_test_row_to_close_
      gap, verify_gap_closed) plus signed agent attribution in
      the rivet V-model — no commercial competitor ships this;
      (2) DSSE-signed in-toto coverage predicates as the default
      report format — no commercial competitor ships this;
      (3) PR-time truth-table review with tutorial-style gap
      explanations cross-linking REQ → FEAT → DEC → decision →
      rows.
    rationale: >
      The market scan in docs/research/v09-soa-and-agent-ux.md
      identified RapiCover as the closest competitor (already
      ships unbounded conditions and missing-vector highlighting
      for C/C++/Ada). Witness cannot beat RapiCover on
      certification heritage in Ada DAL A avionics; instead, the
      superiority claim narrows to *Rust-via-Wasm projects that
      want signed evidence and agent integration*. This sharper
      positioning is auditable: it states what witness is for
      and what it is not for, rather than aspirational
      "best MC/DC tool" framing. The MCP angle is the real
      novelty — Parasoft shipped a generic MCP server in
      March 2026 but nothing MC/DC-native exists as of 2026-04.
    alternatives: >
      Position as "best MC/DC tool" — rejected as aspirational
      and not defensible against RapiCover's Ada heritage.
      Position as "MC/DC for everything" — rejected as too
      broad; the Rust+Wasm+signed+agent-native niche is real
      and underserved. Skip the competitive positioning entirely
      — rejected because v0.9 is the destination release and
      needs the positioning brief to inform v1.0 qualification
      strategy.
    tags: [v0.9, positioning, agent-ux]
    links:
      - type: satisfies
        target: REQ-041
      - type: satisfies
        target: REQ-042
      - type: satisfies
        target: REQ-043

  - id: DEC-022
    type: design-decision
    title: Roadmap composition — v0.6 redo defers runtime to v0.6.1
    status: draft
    description: >
      v0.6.0 ships the consumer side of the MC/DC redo — schema
      additions, mcdc_report module, verdict suite scaffolding
      with hand-derived TRUTH-TABLE.md oracles, V-model artefact
      graph, four research-agent docs covering v0.6.1, v0.7,
      v0.8, v0.9. The on-Wasm trace-buffer instrumentation
      (recommended in docs/research/v06-instrumentation-primitive.md)
      lands as v0.6.1 because the engineering scope of the
      instrumentation rewrite plus runner extension plus end-to-
      end verdict execution exceeds what can be shipped in one
      release alongside the consumer-side work.
    rationale: >
      Three reasons. (1) Independence: schema, reporter, and
      verdict oracles are independent of the runtime path; they
      can be reviewed and adopted by downstream consumers
      (rivet, sigil) immediately. (2) Verifiability: the
      reporter's correctness is verified against hand-derived
      TRUTH-TABLE.md oracles via 6 unit tests (and against the
      `mcdc_report::tests::leap_year_full_mcdc` test that
      reproduces the canonical 3-condition mixed AND/OR
      example). (3) Honesty: shipping v0.6.0 with a half-working
      runtime path would repeat v0.5's overclaim mistake. Better
      to ship the foundation and clearly mark v0.6.1 as the
      closing release than to ship a v0.6.0 that asserts
      capabilities it doesn't deliver.
    alternatives: >
      Block v0.6.0 on the runtime instrumentation rewrite —
      rejected because it concentrates risk and delays the
      consumer-side value. Skip the v0.6 release entirely and
      ship as v0.7 — rejected because the v0.6 redo of v0.5's
      overclaim is an explicit user requirement and should not
      be elided. Ship v0.6 with the runtime stubbed but
      claimed-as-working — rejected as a repeat of v0.5's
      pattern.
    tags: [v0.6, scope, release-strategy]
    links:
      - type: satisfies
        target: REQ-027
      - type: refines
        target: DEC-013

  - id: DEC-023
    type: design-decision
    title: Native Axum first, wasm32-wasip2 deferred to v0.9.x
    status: proposed
    description: >
      v0.9.0 ships witness-viz as a native binary built on Axum 0.8 +
      tokio 1, departing from the v0.8 visualisation brief
      (docs/research/v08-visualisation-roadmap.md) which recommended
      wstd-axum on wasm32-wasip2. The Wasm-component target is a
      v0.9.x stretch goal, not a v0.9.0 blocker.
    rationale: >
      Rivet's serve/ module is the closest production reference inside
      pulseengine for an HTTP-native review UI: it uses native Axum +
      tokio with no template engine and ships ~5,900 LoC of working
      code. Mirroring that stack de-risks v0.9.0 — every pattern the
      visualiser needs is already exercised in a sibling project, so
      the engineering risk concentrates on MC/DC-specific rendering
      rather than on Wasm-component plumbing. The deployable-component
      thesis from v0.8 (DEC-020) remains intact for witness-core but
      does not need to extend to tooling in v0.9.0; v0.9.x can revisit
      wstd-axum once it has more production miles.
    alternatives: >
      Block v0.9.0 on wstd-axum + wasm32-wasip2 build per DEC-020 —
      rejected as scope creep that would defer the visualiser
      indefinitely while wstd-axum matures. Use a static-HTML
      generator (no server) — rejected because gap drill-down and
      MCP integration both need a live request/response surface.
      Build native and Wasm targets in parallel from day one —
      rejected as splitting attention before the native pattern is
      proven against real workloads.
    tags: [v0.9, visualiser, architecture]
    links:
      - type: satisfies
        target: REQ-038
      - type: satisfies
        target: REQ-040
      - type: refines
        target: DEC-020

  - id: DEC-024
    type: design-decision
    title: format!() HTML, no template engine
    status: proposed
    description: >
      witness-viz renders HTML via raw format!() macros and helper
      functions. No maud, no askama, no handlebars — same pattern
      rivet's serve module uses across its ~5,900 LoC of production
      HTML.
    rationale: >
      The v0.8 visualisation brief recommended maud for compile-time
      HTML safety. Rivet's experience contradicts that recommendation
      in practice: format!() with a small set of escape helpers
      (html_escape, attr_escape) produces readable rendering code,
      composes naturally with Rust control flow, and avoids pulling
      in a proc-macro dependency. The trade-off is real — zero
      compile-time HTML-injection safety — but matches the rivet
      pattern and keeps the witness-viz dep tree slim. If the hand-
      written escaping proves insufficient under audit, migrating to
      maud is a localised refactor (the rendering helpers are the
      only callsites).
    alternatives: >
      maud per DEC-020 / v0.8 brief — rejected to match rivet pattern
      and avoid proc-macro dep. askama (Jinja-style) — rejected as
      adding a separate template language to learn. Yew/Leptos
      server-side rendering — rejected as over-engineered for the
      v0.9.0 scope. Hand-rolled string concatenation without format!()
      — rejected as less readable than format!() with helpers.
    tags: [v0.9, visualiser, architecture]
    links:
      - type: satisfies
        target: REQ-038
      - type: refines
        target: DEC-023

  - id: DEC-025
    type: design-decision
    title: HTMX bundled inline as bytes, placeholder for v0.9.0
    status: proposed
    description: >
      witness-viz exposes /htmx.min.js via include_bytes! over a
      placeholder file shipped in v0.9.0. The visualiser works with
      full-page navigation as the v0.9.0 fallback; routes are emitted
      with hx-get / hx-target attributes so the placeholder swap to
      the real HTMX 2.x bundle in v0.9.x is a one-file change.
    rationale: >
      Full HTMX 2.x is ~50KB and the standard delivery pattern is a
      build script that downloads the official release with checksum
      verification. That build-script work is not v0.9.0-blocking —
      the visualiser is reviewable and useful without dynamic swaps,
      and HTMX's progressive-enhancement design means hx-get
      attributes degrade gracefully to plain anchor navigation when
      the script is a no-op. Shipping the placeholder lets v0.9.0
      ratchet on the routing and rendering surface without entangling
      the asset-vendoring pipeline.
    alternatives: >
      Ship full HTMX bundle in v0.9.0 via a build script that
      downloads from htmx.org — rejected as v0.9.0 scope creep
      around supply-chain handling for a third-party JS asset. Skip
      HTMX entirely and use plain anchor navigation — rejected
      because v0.9.x dynamic-swap requirements (live MCP tool
      interaction, gap-drill-down without page reload) need HTMX or
      equivalent, and emitting hx-* attributes now keeps v0.9.x a
      backend-only change. Pull HTMX from a CDN — rejected because
      witness-viz must work offline for compliance review.
    tags: [v0.9, visualiser, htmx]
    links:
      - type: satisfies
        target: REQ-038
      - type: refines
        target: DEC-023

  - id: DEC-026
    type: design-decision
    title: witness-viz as standalone workspace
    status: proposed
    description: >
      witness-viz lives at crates/witness-viz with its own
      Cargo.toml workspace; build via `cd crates/witness-viz &&
      cargo build --release`. The parent witness workspace does not
      include witness-viz as a member crate.
    rationale: >
      Same problem witness-component already solved: Component Model
      linker symbols don't compose with the parent workspace, and
      Axum + tokio together add ~3MB of compile artefacts that don't
      need to materialise on every parent-workspace build. Keeping
      witness-viz as a separate workspace lets it version
      independently (its release cadence will be faster than
      witness-core), keeps the parent CI jobs slim, and isolates the
      transitive deps so a tokio version bump in witness-viz cannot
      perturb witness-core's MSRV floor.
    alternatives: >
      Include witness-viz as a member of the parent workspace —
      rejected for the same reasons witness-component is standalone:
      compile bloat plus dep-graph entanglement. Make witness-viz a
      separate top-level repository — rejected because v0.9.x will
      want to share types with witness-core (DecisionRow, RunRecord)
      and a workspace-relative path dep is the cleanest expression
      of that. Build witness-viz only at release time via CI —
      rejected because local dev for the visualiser must be cheap.
    tags: [v0.9, visualiser, workspace]
    links:
      - type: satisfies
        target: REQ-038

  - id: DEC-027
    type: design-decision
    title: MCP server mounted on Axum router (rivet pattern)
    status: proposed
    description: >
      witness-viz mounts the MCP server on the same Axum router as
      its HTML routes via rmcp's streamable_http_server transport at
      /mcp. One binary, one port, one router — the MCP surface is a
      strict subset of the HTTP API surface, and the same handlers
      back both representations.
    rationale: >
      Rivet uses exactly this pattern: rmcp's streamable_http_server
      mounts at /mcp on the same Axum router that serves the human-
      readable HTML, and MCP tool calls are thin adapters over the
      same internal query functions the HTML routes use. The result
      is that humans clicking a row and agents calling
      get_decision_truth_table see the same semantic model — there
      is no MCP-private surface to drift from the HTTP-private
      surface. This was already stated in DEC-021 / FEAT-017 as the
      v0.8 plan; DEC-027 confirms it survives the native-Axum pivot
      (DEC-023) unchanged.
    alternatives: >
      Run the MCP server on a separate port via stdio or its own
      Axum app — rejected because two surfaces drift. Skip MCP in
      v0.9.0 and ship HTML-only — rejected because REQ-039 is in
      v0.9.0 scope and the agent-UX claim is what makes v0.9
      distinctive against LDRA / VectorCAST. Implement MCP in a
      separate binary — rejected because deploying two binaries for
      a single review surface is operationally worse for users.
    tags: [v0.9, mcp, architecture]
    links:
      - type: satisfies
        target: REQ-039
      - type: refines
        target: DEC-021

  - id: DEC-011
    type: design-decision
    title: Keep walrus as the rewrite backend in v0.2; revisit in v0.3
    status: draft
    description: >
      v0.2 stays on walrus. Whamm (Wasm instrumentation DSL, April 2025)
      and wasm-tools are recorded as candidate alternatives but no
      migration is undertaken in v0.2.
    rationale: >
      Walrus works for v0.1 and the v0.2 instrumentation surface (br_if,
      if-else, br_table, helper-function injection). Migration to a
      different backend has real cost (rewriting tests, learning a new
      API surface) and no v0.2-specific benefit. Whamm becomes more
      attractive at v0.4 if component-model support is needed (REQ-012).
    alternatives: >
      Migrate to Whamm now — rejected as scope creep. Migrate to
      wasm-tools — rejected; wasm-tools is lower-level and would not
      simplify v0.2 work.
    tags: [v0.2, architecture]
    links:
      - type: satisfies
        target: REQ-005
      - type: refines
        target: DEC-001

  # -------------------------------------------------------------------------
  # v0.23 + v0.24 — viz + release infrastructure decisions, backfilled
  # -------------------------------------------------------------------------
  - id: DEC-028
    type: design-decision
    title: Pure-render seam — single core for serve + export
    status: implemented
    description: >
      Dashboard rendering is split into `crate::render` (pure,
      borrow-only `RenderContext`, returns
      `RenderResult { title, body }`) and thin transport wrappers.
      The Axum handlers (live HTMX dashboard) and the static-export
      driver call the same `render_overview` / `render_verdict` /
      `render_decision` / `render_gap` functions; the only
      difference is `RenderContext::href_prefix` + `link_ext` (set
      to `/` + `""` for serve, depth-counted `../` + `".html"` for
      export). views.rs shrank from ~565 lines of axum-inline
      formatting to ~125 lines of plumbing.
    rationale: >
      Rivet uses this exact pattern (rivet-cli's `render::render_page`
      called by both serve and export drivers, see
      rivet-cli/src/render/mod.rs:33-305 and main.rs:7972-8327).
      The serve/export divergence is captured in two strings, not
      two implementations, so the static dump's link shape is a
      pure function of page depth — REQ-088-style asset-inlining
      blowups (the rivet failure mode the seam was designed to
      avoid) cannot happen because the renderer never touches I/O.
    alternatives: >
      Scrape the live Axum server via in-process HTTP requests and
      rewrite paths — rejected because absolute /verdict/foo links
      bake in the HTMX runtime and don't relativise. Maintain two
      separate render implementations for serve vs static — rejected
      because every page divergence becomes a divergence to police.
      Re-implement everything via tera/askama — rejected because the
      format!() helpers already worked and the seam value isn't in
      the template engine, it's in factoring transport out.
    tags: [v0.23, viz, render-seam]
    links:
      - type: satisfies
        target: REQ-044
      - type: refines
        target: DEC-024

  - id: DEC-029
    type: design-decision
    title: GitHub Pages publish via actions/deploy-pages + v* tag policy
    status: implemented
    description: >
      On every `v*` tag push, release.yml runs a `publish-pages` job
      that downloads the compliance-evidence archive, builds
      witness-viz fresh on the runner, runs `witness-viz export`
      against the unpacked verdict-evidence, and uploads to GitHub
      Pages via the official `actions/upload-pages-artifact` +
      `actions/deploy-pages` pair. The `github-pages` environment
      receives a `v*` tag policy (manually added once via gh api;
      release.yml carries the gh-api command in a comment for any
      fresh fork / mirror).
    rationale: >
      The native deploy-pages action gives immutable per-run
      deployments with no `gh-pages` branch to maintain. Pages
      source = "GitHub Actions" mode bypasses branch protection
      entirely. The first v0.23.0 cut hit a one-shot 403 because
      the auto-created environment ships with a default
      deployment-branch policy allowing only `main` — fixed by
      adding a `v*` tag policy via gh api; the fix is documented in
      release.yml so future repo splits don't repeat the gotcha.
    alternatives: >
      peaceiris/actions-gh-pages (third-party, pushes to gh-pages
      branch) — rejected because every deploy mutates a tracked
      branch and the source-of-truth becomes git-mutable. Self-host
      via S3 + CloudFront — rejected because the entire point is
      zero-infrastructure. Skip the publish job and document the
      manual `witness viz-export` step — rejected because nobody
      runs the manual step.
    tags: [v0.23, release, pages]
    links:
      - type: satisfies
        target: REQ-044
      - type: refines
        target: DEC-001

  - id: DEC-030
    type: design-decision
    title: Walrus 0.26.3 unpin — upstream PR #316 merged
    status: implemented
    description: >
      The pulseengine/walrus@ae623af git pin carried since v0.21 is
      reverted; witness now depends on crates.io `walrus = "0.26.3"`
      (released 2026-05-26, contains the legacy `try`/`catch`
      multi-value-handler panic fix from wasm-bindgen/walrus#316).
      crates.io publishing is unblocked.
    rationale: >
      Fork pins are tech debt: they prevent crates.io publish, slow
      `cargo update`, fail dependabot, and quietly diverge from
      upstream. The fix landed in walrus 0.26.3 on the same day
      #316 merged. No reason to keep carrying the fork.
    alternatives: >
      Stay on the fork pin and continue carrying the patch — rejected
      because the upstream fix is byte-equivalent and shipping. Vendor
      walrus into the witness tree — rejected because vendoring a
      30 KLOC dep over a one-function patch is disproportionate.
    tags: [v0.23, dependencies]
    links:
      - type: satisfies
        target: REQ-046
      - type: refines
        target: DEC-001

  - id: DEC-031
    type: design-decision
    title: Hybrid source rendering — inline snippet + full-file page
    status: implemented
    description: >
      Source visibility in the v0.24 viz dashboard is two-tier:
      (1) inline snippet on each Decision and Gap page, showing ±5
      lines around the recorded source_line with the source_line
      highlighted, no syntax highlighting (plain `<pre>` keeps the
      snippet at ~300 bytes and removes a dep); (2) a separate
      syntax-highlighted full-file page reachable via a "view full
      file" link from the snippet, supporting `#L<line>` deep
      anchors. Syntect provides language detection + highlighting
      for Rust, C, C++, Swift, Kotlin, Zig, Go. Source files are
      bundled by the export driver from a `--source-root <path>`
      flag; missing files degrade gracefully ("source unavailable").

      v0.24.1 resolution refinement: witness reports carry
      basename-only `source_file` (DWARF DW_AT_name, e.g. `lib.rs`),
      so resolution is verdict-scoped via
      `resolve_source_path(source_root, verdict, source_file)` which
      tries `<root>/<verdict>/<source_file>`,
      `<root>/<verdict>/src/<basename>` (the witness
      `verdicts/<name>/src/` fixture layout),
      `<root>/<source_file>`, `<root>/<basename>` in order.
      Full-file pages are verdict-scoped at
      `out/source/<verdict>/<source_file>.html` to avoid basename
      collisions across verdicts. The published dashboard passes
      `--source-root verdicts`. Dependency-crate files (e.g. files
      pulled from ~/.cargo, not vendored under verdicts/) remain
      unresolved — deferred future work to vendor measured sources
      into the evidence bundle.
    rationale: >
      Inline-only (Option A) leaves the reviewer guessing about the
      surrounding function body; full-file-only (Option B) forces a
      click to see context. Hybrid gives free immediate context plus
      one-click full view. Bundle-size impact: ~300 B per decision
      page inline + ~5-20 KB per unique source file × ~50 files =
      ~500 KB-1 MB extra at the canonical 13-verdict scale. Tractable
      given GitHub Pages limits (1 GB total, 100 GB/month bandwidth).
    alternatives: >
      Inline snippet only (Option A) — rejected because the next
      ask is always "show me more context". Full-file pages only
      (Option B) — rejected because the click-cost defeats Codecov-
      parity ergonomics. Link out to a GitHub blob URL — rejected
      because the static dump must work from `file://` and any
      repo-mirror host without network. Render syntax highlighting
      with Prism.js client-side — rejected because the static
      dashboard contract is "no JS".
    tags: [v0.24, viz, source]
    links:
      - type: satisfies
        target: REQ-045
      - type: refines
        target: DEC-028

  - id: DEC-032
    type: design-decision
    title: pr-comment delta — match by name / id / index, no fuzzy diff
    status: implemented
    description: >
      The pr-comment delta matches base↔head verdicts by name,
      decisions within a verdict by `id`, and conditions within a
      decision by `index`. A verdict/decision/condition present on
      only one side is reported as added/removed, not diffed. Status
      transitions are computed from the `status` string field
      ("proved" / "gap" / "dead"); a transition toward "proved" is an
      improvement, away from "proved" is a regression. Counts come
      from the report's `overall` block directly.
    rationale: >
      The witness report carries stable identity keys (verdict dir
      name, decision id, condition index) that survive a code change
      as long as the decision structure is stable — exactly the
      common-case PR. Matching on those keys is O(n), deterministic,
      and needs no heuristic alignment. Fuzzy matching (e.g. by
      source_line or truth-table shape) would mis-pair decisions
      across a refactor and produce noisy false regressions; the
      honest answer when identity keys don't line up is
      "added/removed", which a reviewer can interpret correctly. This
      mirrors `witness diff` (DEC for the branch-set delta) one level
      up at the MC/DC-condition granularity.
    alternatives: >
      Fuzzy/positional decision matching — rejected for false
      regressions across refactors. Diff the raw truth tables —
      rejected because row ids are not stable across re-runs and the
      condition-status transition is the reviewer-relevant signal,
      not row churn. Reuse `witness diff` directly — rejected because
      it operates on branch-set / coverage manifests, not MC/DC
      condition status; the two deltas answer different questions.
    tags: [v0.25, viz, pr-review]
    links:
      - type: satisfies
        target: REQ-049
      - type: refines
        target: DEC-028

  - id: DEC-033
    type: design-decision
    title: Multi-version Pages — rebuild whole site each deploy
    status: implemented
    description: >
      `actions/deploy-pages` publishes an immutable artifact that
      replaces the entire site each run, so multi-version hosting
      rebuilds the full `/vX.Y.Z/` tree on every release rather than
      appending. The publish-pages job auto-detects the last 3
      release tags, downloads each one's compliance-evidence asset,
      and renders every version with the *current* witness-viz —
      one renderer, consistent output across versions. Source-file
      snippets are emitted only for the latest version (its
      `verdicts/` tree is the checked-out one); older versions render
      without `--source-root` to avoid source-line drift against a
      tree that has moved on. The cross-version landing page is
      generated by `witness-viz pages-index` from each version's
      `summary.json`, not by fragile workflow shell.
    rationale: >
      Rebuilding is the only model deploy-pages supports without a
      mutable gh-pages branch; it is deterministic and self-healing
      (a corrupted prior deploy can't poison the next). Rendering old
      evidence with the current witness-viz keeps the visual language
      identical across versions and means a renderer bug-fix
      retroactively improves every hosted version. Generating the
      index in-tool (vs jq/shell) makes it unit-testable and keeps
      the workflow thin. Skipping source for non-latest versions is
      the honest choice: the only source tree on the runner is the
      tagged checkout, and rendering vN-1 decisions against vN
      sources would mis-point line numbers.
    alternatives: >
      Mutable gh-pages branch that accumulates versions — rejected
      because it reintroduces a git-tracked source-of-truth the
      deploy-pages model was chosen (DEC-029) to avoid. Rebuild old
      witness-viz per tag to render each version with its own code —
      rejected as slow and because a renderer fix then can't
      retroactively improve old hosted versions. Hand-write the
      landing page in workflow jq — rejected for testability.
    tags: [v0.26, viz, pages]
    links:
      - type: satisfies
        target: REQ-050
      - type: refines
        target: DEC-029

  - id: DEC-034
    type: design-decision
    title: Rename package names only — keep lib names, keep bin names
    status: implemented
    description: >
      The crate rename touches only `[package] name` and the
      path-dependency keys that reference it. Every `[lib] name`
      stays (`witness_core`, `witness_viz`, …) so no `use` statement
      in the tree changes, and the `[[bin]]` names stay (`witness`,
      `witness-viz`) so installed commands are unchanged. Cargo
      decouples the three: crates.io identity (package name), the
      `use` path (lib name), and the installed command (bin name).
    rationale: >
      The naive reading of "rename the crates" is a tree-wide churn
      of every `use witness_core::…`. Cargo's three-way decoupling
      means the rename is ~5 Cargo.toml edits with zero source
      changes — the package name is only seen by crates.io and by
      the `version = "…", package = "…"` form of a dependency.
      Keeping `[[bin]] name = "witness"` means `cargo install
      witness-mcdc` still yields a `witness` command, so the
      namespace move is invisible to users. Minimal blast radius for
      a packaging-only concern.
    alternatives: >
      Rename lib names too (witness_core → witness_mcdc_core) —
      rejected as gratuitous source churn for no benefit; the lib
      name is internal. Rename the bin to `witness-mcdc` — rejected
      because it breaks every user's muscle memory and every doc's
      `witness …` invocation for a crates.io-only problem. Negotiate
      the `witness` crates.io name from flammafex — rejected as slow
      and uncertain for a legitimate prior registration.
    tags: [v0.27, packaging]
    links:
      - type: satisfies
        target: REQ-051

  - id: DEC-035
    type: design-decision
    title: Render provenance from manifest.json, not a new pipeline
    status: implemented
    description: >
      Per-condition provenance reads two maps out of the existing
      `manifest.json` (which the viz already loads for branch
      counts) and joins both to conditions by branch_id:
      `branches[]` (`id → {function_name, kind, byte_offset}`) and
      `branch_inline_chains` (`id → [{call_file, call_line}]`). No
      witness-core change, no new evidence file, no report-schema
      bump. The join key is the manifest branch `id`, which equals
      the report condition's `branch_id` (verified against the
      json_lite bundle: condition branch_ids and manifest branch ids
      share one 0..N space). Function names are Rust-mangled (legacy
      `_ZN…` and v0 `_R…`); rustc-demangle renders them readable.
    rationale: >
      The data is already produced and shipped in every bundle; the
      only gap was presentational. The investigation that motivated
      this (json_lite decision #29) showed the *useful* signal is
      `function_name` + `kind` — a br_table's 29 arms all share one
      byte_offset and have NO inline chain, so chain-only rendering
      would have explained nothing. `branch_inline_chains` is sparse
      (2 of 165 branches in json_lite); it's an additional layer for
      the few genuinely-inlined branches, not the primary signal.
      Reading from the sibling manifest keeps report.json's contract
      stable and makes this a viz-only PR. rustc-demangle is the
      standard, tiny, no-transitive-deps crate for the name rendering.
    alternatives: >
      Render only the inline chain (the original v0.27 plan) —
      rejected after the data showed it covers ~1% of branches and
      misses the br_table case entirely. Add provenance to
      report.json's condition records — rejected as a schema change
      for data obtainable from the sibling manifest. Recompute from
      Wasm + DWARF in the viz — rejected as duplicating witness-core.
      Hand-roll a demangler — rejected; rustc-demangle exists and is
      correct for both mangling schemes.
    tags: [v0.27, viz, mcdc]
    links:
      - type: satisfies
        target: REQ-052
      - type: refines
        target: DEC-031

  - id: DEC-036
    type: design-decision
    title: Unbundle components in-process via wasmparser, not shell-out
    status: approved
    description: >
      Component → core-module extraction is done in-process by
      walking the component with wasmparser and pulling the embedded
      core module from `Payload::ModuleSection`, rather than shelling
      out to `wasm-tools component unbundle`. witness-core already
      depends on wasmparser (it walks payloads for DWARF custom
      sections), so no new dependency. `instrument` runs before any
      export is named (exports come at `run` time), so it cannot
      select by target export — it extracts the SOLE embedded core
      module. A component with multiple core modules (a
      preview1→preview2 adapter beside the main module) errors clearly
      toward wasm32-wasip1 rather than guessing which is the
      measurement target. The preview1 run path
      (Config::wasm_component_model(false), WASI p1 linker) is
      unchanged — the extracted core of a leaf/computational function
      has no imports and runs as-is.
    rationale: >
      Shelling out would reintroduce an external-tool runtime
      dependency (wasm-tools on PATH) and a version-coupling hazard —
      the spike already caught wasm-tools renaming the unbundle flag
      (`--module-out` → `--module-dir`), which would silently break a
      shell-out integration and is exactly the bespoke-glue fragility
      witness avoids elsewhere (embedded wasmtime, no cooperation
      protocol). In-process keeps witness self-contained and pins the
      behaviour to a library version in Cargo.lock. Sole-module
      extraction aligns the selection rule with the honest scope: a
      single core module IS the leaf/computational case; multiple
      core modules correlate with the adapter / syscall-heavy case
      that's already routed to wasip1. No guessing an index.
    alternatives: >
      Shell out to `wasm-tools component unbundle` — rejected:
      external runtime dep + flag-drift fragility (already observed).
      Guess a module by index / size heuristic when several are
      present — rejected as unreliable; erroring toward wasip1 is
      honest. Add an explicit `--component-module` selector — deferred
      until a real multi-module need appears. Add a full
      Component-Model run path (instrument core → re-bundle → run
      under a p2 linker) so syscall-heavy wasip2 works — deferred:
      large, and wasip1 already serves that case. Keep erroring and
      tell users to unbundle manually (status quo) — rejected: makes
      the ecosystem-direction target second-class.
    tags: [v0.28, instrument, wasip2, component-model]
    links:
      - type: satisfies
        target: REQ-053
      - type: refines
        target: DEC-006

  - id: DEC-037
    type: design-decision
    title: Component MC/DC via meld fusion, not witness component surgery
    status: implemented
    description: >
      For Component-Model inputs beyond the single-embedded-core leaf
      case (FEAT-033), the path is composition with meld, not growing
      a component run path inside witness. meld fuses a component into
      a single core module (canonical-ABI adapters resolved at build
      time); witness then instruments that core module unchanged. The
      witness-side change is guidance only: the ComponentUnbundle
      error points the user at `meld fuse <comp> -o core.wasm`. No
      runtime coupling — witness does not shell out to meld.
    rationale: >
      A witness-internal run path for syscall-heavy components hit a
      hard wall (spike, v0.30): the WASI p2 canonical-ABI imports
      only resolve inside a component, and — decisively — witness
      extracts counters via the core module's exported globals
      (DEC-003), but a component can only export func/value/type/
      instance, NOT raw core globals. Re-bundling an instrumented
      core encapsulates the counters; there is no get_global on an
      inner core instance. meld dissolves this by flattening to a
      core module BEFORE witness sees it — so the established
      counter mechanism works untouched. This is the toolchain's
      composition premise (meld fuses, witness measures), and it
      keeps each tool to its specialty. Verified end-to-end: a leaf
      component fused to a 0-import core, instrumented, ran, and
      measured 3/3 branch coverage.
    alternatives: >
      Grow a Component-Model run path in witness (instrument core →
      re-bundle → run under a p2 linker) — rejected: requires
      re-architecting counter extraction (core globals aren't
      component-exportable), a multi-release effort, and duplicates
      meld's fusion. Shell out to meld from witness automatically —
      deferred: reintroduces the external-tool runtime coupling /
      version-drift fragility DEC-036 avoided; documented guidance is
      lower-risk. Block component inputs entirely — rejected: makes
      the ecosystem-direction target unmeasurable when a clean
      composition exists.
    tags: [v0.30, component-model, meld]
    links:
      - type: satisfies
        target: REQ-054
      - type: refines
        target: DEC-036
      - type: constrained-by
        target: DEC-003

  # -------------------------------------------------------------------------
  # v0.31 — where demangling lives
  # -------------------------------------------------------------------------
  - id: DEC-038
    type: design-decision
    title: Demangle once in witness-core; retain the raw symbol for attestation
    status: implemented
    description: >
      Demangling of function symbols happens once, in a shared
      witness-core helper applied at the branch-attribution site, and
      the demangled string is stored as a derived display field
      alongside the retained raw `function_name`. Presentation layers
      (report text, LCOV, rivet-evidence, predicate, viz) consume the
      demangled field rather than each re-demangling the raw symbol.
    rationale: >
      Before v0.31, only witness-viz demangled (data.rs:232) while
      witness-core stored the raw mangled symbol — so the HTML was
      readable but report JSON / LCOV / rivet-evidence / predicate
      leaked `_ZN..E` names. Demangling at every presentation layer
      duplicates logic (the exact failure mode the toolchain avoids)
      and drifts; demangling once at the source fixes all consumers
      together. The raw symbol is retained, not replaced, because the
      attestation/predicate body is a stable evidence artifact —
      demangling output can change across rustc-demangle versions, so
      the canonical record keeps the ground-truth symbol and treats
      the demangled name as a display convenience.
    alternatives: >
      Demangle in each presentation layer (status quo + extend to
      report/lcov/rivet-evidence) — rejected: duplicated, drift-prone.
      Replace the raw symbol with the demangled string in the manifest
      — rejected: loses attestation ground truth and couples the
      evidence body to a demangler version. Leave it viz-only —
      rejected: REQ-055 requires readable names in all emitters.
    tags: [v0.31, demangle, attribution]
    links:
      - type: satisfies
        target: REQ-055
      - type: constrained-by
        target: DEC-003

  # -------------------------------------------------------------------------
  # v0.32 — counter width
  # -------------------------------------------------------------------------
  - id: DEC-039
    type: design-decision
    title: Hit counters are i64 (wrapping), not i32 and not saturation-guarded
    status: implemented
    description: >
      The per-branch hit counter global (`__witness_counter_<id>`) is
      an i64, incremented with i64.add. The brval/brcnt MC/DC
      reconstruction globals stay i32 (they carry bit patterns /
      outcomes, not accumulating counts), and linear-memory cursor
      arithmetic stays i32 (wasm32 addresses). No per-increment
      saturation guard is added.
    rationale: >
      The counters were i32 incremented with i32.add (wraps at 2^32),
      and the host read them back reinterpreting the bits — so a branch
      hit more than i32::MAX (~2.1e9) times sign-flipped and decoded as
      a garbage u64, silently misreporting coverage at real-application
      scale. The report side already carries hits as u64, so i64 at the
      wasm level simply aligns the representation. i64 wraps only at
      2^64 (~1.8e19) — unreachable in any real run, fuzz corpus
      included. REQ-036 says "saturating"; we deliberately do NOT add a
      saturation guard because it would put a branch on the hottest
      path (every counter increment), bloating instrumentation and
      runtime for a bound that i64 already makes unreachable. The host
      readback already handles Val::I64, so the change is two edits in
      the instrumenter.
    alternatives: >
      Keep i32 + add a saturation guard — rejected: a compare+branch on
      every increment is the worst place to spend cycles, and still
      caps at 2^32. True saturating i64 (guarded) — rejected for the
      same hot-path cost against an unreachable 2^64 bound. The
      streaming counter-encoding mode for modules exceeding the
      exported-globals cap (REQ-036's second clause) is deferred to a
      later release; this DEC covers counter width only.
    tags: [v0.32, scaling, instrumentation, counters]
    links:
      - type: satisfies
        target: REQ-036

  # -------------------------------------------------------------------------
  # v0.33 — br_table MC/DC verdict soundness
  # -------------------------------------------------------------------------
  - id: DEC-041
    type: design-decision
    title: br_table MC/DC verdict comes from the bit-level audit, not arm-hits
    status: implemented
    description: >
      A br_table decision's MC/DC verdict is derived from the
      bit-level `br_table_audit` (independent-effect over the
      discriminant's bits), not from per-arm execution counts. An arm
      being taken (hits > 0) is reported as branch coverage, never as
      "MC/DC proved." The decision is FullMcdc only when the audit
      proves every observed bit; a single observed discriminant yields
      Gap/Partial, not a full pass. The mcdc report surfaces the
      bit-level audit (bit_width, per-bit status + witness pairs).
      Supersedes DEC-015 (which deferred br_table MC/DC to "v0.7").
    rationale: >
      A v0.33 spike found a soundness bug: the per-arm condition
      verdict (mcdc_report.rs ~line 700) marked an arm `Proved` iff
      `hits > 0`, with `pair: None` — i.e. proved by a SINGLE
      execution, no independent-effect demonstrated. Running every arm
      once would report false FullMcdc on what is really branch
      coverage, violating DEC-002 (branch coverage is not MC/DC) and
      witness's core promise. Decisively, the sound mechanism already
      exists: `derive_br_table_audit` computes a bit-level audit
      (bit_width, per-bit Proved/Partial/Gap, witness pairs) and
      attaches it to the decision — it was simply not wired into the
      verdict or the report. So the fix is to make the verdict
      consistent with the audit, not to invent new analysis.
    alternatives: >
      Keep per-arm conditions but require a contrast (arm taken AND
      some other discriminant observed) — simpler, but a weaker model
      than the bit-level audit witness already chose, and it would
      report two competing notions of "proved." Leave hits>0 and just
      relabel — rejected: the status would still be unsound. The
      DWARF-guard reconstruction DEC-015 feared (per-arm guard
      expressions) is NOT required: the discriminant-bit model is the
      MC/DC analogue for table dispatch.
    tags: [v0.33, mcdc, br_table, soundness]
    links:
      - type: satisfies
        target: REQ-037
      - type: refines
        target: DEC-015

  # -------------------------------------------------------------------------
  # v0.34 — verdict soundness audit
  # -------------------------------------------------------------------------
  - id: DEC-042
    type: design-decision
    title: A reached decision with zero conditions is NoWitness, not FullMcdc
    status: implemented
    description: >
      A decision that was reached (has rows) but carries no conditions
      is reported as NoWitness, never FullMcdc. Applies to both the
      headline boolean verdict and the per-context drill-down buckets.
    rationale: >
      A soundness audit of every verdict-assignment site (prompted by
      the v0.33 br_table soundness bug, DEC-041) confirmed the boolean
      MC/DC path is sound — a condition is marked Proved only when
      `find_independent_effect_pair` returns a genuine row pair — and
      the br_table path is fixed (DEC-041). The one remaining smell was
      the `(no proved, no gap)` match arm mapping to FullMcdc with the
      comment "0 conditions; degenerate". That arm fires only for a
      reached-but-conditionless decision, and counting such a vacuous
      decision in the "N/N full MC/DC" numerator overstates coverage —
      the same failure class as the br_table bug (claiming MC/DC where
      none was demonstrated). A decision with nothing to prove has not
      been proved; NoWitness keeps it out of the FullMcdc count.
    alternatives: >
      Leave it FullMcdc — rejected: vacuous decisions inflate the
      headline coverage number, eroding trust in the one metric witness
      sells. Add a dedicated NotApplicable status — heavier; NoWitness
      already means "reached, nothing proved" and fits.
    tags: [v0.34, mcdc, soundness, audit]
    links:
      - type: satisfies
        target: REQ-006
      - type: refines
        target: DEC-041

  # -------------------------------------------------------------------------
  # v0.35 — invoke-with-args separator (issue #107)
  # -------------------------------------------------------------------------
  - id: DEC-043
    type: design-decision
    title: --invoke-with-args separates name from args on '=', ':' as legacy fallback
    status: proposed
    description: >
      `--invoke-with-args <spec>` splits the export name from the comma-
      separated arg list on the FIRST `=` when the spec contains one;
      otherwise it falls back to splitting on the first `:` (the v0.9.6
      behaviour). `=` cannot appear in a WIT export name
      (`namespace:package/iface@ver#func`), so it unambiguously
      addresses Component-Model names; `:` keeps simple core names like
      `is_leap:2024` working unchanged.
    rationale: >
      The original spec split on the first `:` (run.rs parse_invoke_spec),
      but a colon is part of every WIT export name, so those exports were
      unaddressable (issue #107). Switching outright to `=` would break
      every existing `name:args` invocation; supporting `=` with a `:`
      fallback fixes the collision while preserving back-compat. relay
      independently reached the same `=` choice for their mirror harness.
      No-arg WIT exports are already addressable via `--invoke` (no
      split), so only the typed-args path needed the change.
    alternatives: >
      Split on the LAST `:` — rejected: a no-arg WIT name ends in
      `#func` not `:`, and its namespace contains colons, so last-colon
      mis-splits (`...@1.0.0` | `monitor`). Switch to `=` only —
      rejected: breaks existing `name:args` users. A `--export`/`--args`
      flag pair — heavier CLI surface for the same outcome.
    tags: [v0.35, cli, component-model, issue-107]
    links:
      - type: satisfies
        target: REQ-056

  # -------------------------------------------------------------------------
  # Component-Model coverage readback (issue #110) — spiked 2026-06-20
  # -------------------------------------------------------------------------
  - id: DEC-044
    release: v0.36.0
    type: design-decision
    title: Component-Model coverage readback via runtime introspection, not an upstream component API
    status: accepted
    description: >
      witness reads its `__witness_counter_*` globals out of a
      Component-Model run via runtime introspection, not via a new
      wasmtime `component::Instance` accessor. Two backends: (1) a kiln
      `--harness` (kilnd) that snapshots the inner-core globals natively
      and emits witness-harness-v1 (primary; kiln#343, works today); (2)
      wasmtime's existing public coredump path
      (`coredump_on_trap` → `WasmCoreDump.instances()` →
      `Instance::get_global`) as the differential cross-check oracle.
    rationale: >
      A 2026-06-20 spike verified both: kilnd round-trips the v1 snapshot
      end-to-end; and wasmtime 45's coredump reads a component's
      inner-core globals by name (witness counters also survive
      `wasm-tools component new`). So the originally-planned upstream
      request (expose inner-core globals on `component::Instance`) is
      unnecessary as a blocker — downgraded to a nice-to-have (a non-trap
      global snapshot would be cleaner than coredump_on_trap) and not
      filed. Owning kiln also gives a certifiable/deterministic runtime
      and a second, independent measurement for cross-validation
      (REQ-058). The wasmtime backend requires instrument-in-place
      (REQ-059); the kiln backend works on meld-fused cores now.
    alternatives: >
      File the upstream wasmtime ask and wait — rejected: the capability
      already exists publicly (coredump) and kiln gives us a path we
      control. Hand-roll a core-level WASI host in witness — rejected:
      kiln already runs Component-Model + WASI 0.2 and we own its API.
    tags: [component-model, readback, dual-runtime, issue-110]
    links:
      - type: satisfies
        target: REQ-058
      - type: refines
        target: REQ-054

      - type: produced-by
        target: AS-001
  # -------------------------------------------------------------------------
  # v0.36 — instrument-in-place mechanism (REQ-059)
  # -------------------------------------------------------------------------
  - id: DEC-045
    release: v0.36.0
    type: design-decision
    title: Instrument a component in place via inner-core byte-splice with LEB length repair
    status: accepted
    description: >
      `witness instrument --in-place` rewrites a single-core component's
      inner core module and re-emits the COMPONENT (shell + WIT exports
      intact), instead of the default unbundle-to-bare-core. Mechanism:
      locate the embedded core via wasmparser `Payload::ModuleSection`
      `unchecked_range` (already used by extract), instrument those bytes
      with the existing walrus pipeline, then splice the instrumented
      core back at that range — repairing the section's LEB128 length
      prefix to the new (larger) size and copying every other byte of
      the component verbatim. No re-encode of the component, no new
      wasm-encoder dependency.
    rationale: >
      The default path discards the component shell (and its lifted WIT
      exports), so the instrumented core can't be driven through a
      runtime's component API (REQ-059; verified: `wasm-tools component
      new` on a bare core does not re-lift the guest export). Splicing in
      place keeps the real exports callable while the `__witness_counter_*`
      globals land in the inner core, readable post-run via the kiln
      snapshot or wasmtime coredump (DEC-044). A pure byte-splice is
      robust for the leaf single-core case and avoids depending on
      wasm-encoder's component re-encoder; the section length prefix is a
      standard unsigned LEB128 immediately preceding the module bytes,
      verified before rewrite (else error). Multi-core components
      (adapter present) keep the existing unbundle error.
    alternatives: >
      Full component re-encode via wasm-encoder (copy every section,
      substitute the module) — heavier, new dependency, and parse_all
      flattens nested-module sections complicating top-level copy.
      Re-componentize a bare instrumented core with `wasm-tools component
      new` — rejected: drops the lifted exports. Keep only the meld +
      kiln-harness path — rejected: the wasmtime-component backend
      (cross-check oracle, REQ-058) needs a runnable component.
    tags: [v0.36, component-model, instrument, issue-110]
    links:
      - type: satisfies
        target: REQ-059

      - type: produced-by
        target: AS-001
  # -------------------------------------------------------------------------
  # v0.38 — coredump readback via end-of-export trap injection (REQ-060)
  # -------------------------------------------------------------------------
  - id: DEC-046
    release: v0.38.0
    type: design-decision
    title: Read component counters via end-of-export trap injection + coredump
    status: accepted
    description: >
      The wasmtime-component backend injects `unreachable` at the end of
      every lifted export's inner-core function (`inject_export_traps`),
      runs the export under `coredump_on_trap`, and reads the counter
      globals from `WasmCoreDump.instances()`.
    rationale: >
      wasmtime 45 exposes no `component::Instance` global accessor, and a
      normally-returning export yields no trap — so the injected end-of-run
      trap is what makes the coredump (hence the readback) possible.
      Verified by spike (coredump reads inner-core globals by name) and an
      e2e test. The host cannot force a clean end-of-run trap (fuel/epoch
      interrupt at arbitrary points). The injection destroys normal
      returns, so it is applied in memory only on the coredump backend
      path, never for embedded/kiln runs. kiln's harness reads globals
      natively (no trap), so the two backends are genuinely independent
      for the cross-check.
    alternatives: >
      Upstream `component::Instance` global accessor (downgraded to
      nice-to-have, DEC-044); fuel/epoch host trap (arbitrary timing —
      rejected); run the bare inner core under preview1 (can't satisfy p2
      imports — the original wall).
    tags: [v0.38, component-model, issue-110]
    links:
      - type: satisfies
        target: REQ-060
      - type: refines
        target: DEC-044

      - type: produced-by
        target: AS-001
  # -------------------------------------------------------------------------
  # v0.39 — synth-provenance schema + join key (REQ-061)
  # -------------------------------------------------------------------------
  - id: DEC-047
    release: v0.39.0
    type: design-decision
    title: synth-provenance-v1 schema, (func_index, byte_offset) join key, object-disposition vocabulary
    status: accepted
    description: >
      The witness↔synth contract: synth emits `synth-provenance-v1` — a list
      of `{func_index, instruction_offset, kind}` entries where kind is one of
      preserved | folded-predication | eliminated-constant(+scry_evidence) |
      split-into-object-branches(count). witness joins it to its manifest
      branches by `(function_index, byte_offset)` and emits
      `witness-object-disposition-v1` (per branch: obligation-stands |
      justified-infeasible | needs-object-coverage | no-provenance; plus
      only-in-synth divergences).
    rationale: >
      The join key already exists in every BranchEntry (`function_index` +
      `byte_offset` from walrus `InstrLocId`), so no fragile index-matching —
      synth's explicit ask is satisfied with zero manifest change. Validated:
      an if/else's two branch-arms share one WASM instruction byte_offset, so a
      single synth entry maps to both arms — the join is correctly many-to-one.
      The reconciler is witness-side (witness owns the truth table +
      rivet-evidence); scry supplies the eliminated-constant justification as
      an opaque evidence reference (the map carries the reference, not the
      analysis). Schema proposed on #109/#396 for synth to build toward.
    alternatives: >
      synth-side reconciler (rejected — witness owns the truth table); a new
      manifest field for the join key (unnecessary — byte_offset already
      present); index-matching witness branch ids to synth (fragile, rejected
      by the issue).
    tags: [v0.39, object-traceability, issue-109]
    links:
      - type: satisfies
        target: REQ-061

      - type: produced-by
        target: AS-001
  # -------------------------------------------------------------------------
  # Agent provenance convention (REQ-062)
  # -------------------------------------------------------------------------
  - id: DEC-048
    type: design-decision
    title: Agent provenance via commit trailers + rivet ai-session / produced-by
    status: accepted
    description: >
      Agents self-identify at two layers. (1) Git — every agent commit and
      PR carries the trailer block: `Created-By: <tool>` / `Model: <model-id>`
      / `Session-Id: <session>` / `Operator: <human-in-the-loop>`, so
      `git log --grep 'Session-Id:'` separates human vs each agent. (2) rivet
      — each run is an `ai-session` artifact and agent-authored artifacts link
      `produced-by` to it (the audit-side authorship record). The trailer's
      Session-Id resolves to the ai-session, joining the git and rivet views.
    rationale: >
      One GitHub identity (avrabe) is shared by the operator, their agents,
      and Claude Code, so GitHub's author field can't reveal origin. rivet
      provides `ai-session` (authorship unit) + `produced-by` (audit-side
      Co-Authored-By) precisely for this; the trailer makes it visible in
      plain `git log`/`blame` at zero infra. A distinct `Created-By`/`Session-Id`
      trailer is preferred over `Co-Authored-By` (banned by some projects for
      AI, and it carries no session). `ai-session.invoker` is personal data,
      so a GDPR lawful-basis is recorded (Art. 6(1)(f)); a `dpia` link is
      available if scope grows.
    alternatives: >
      Co-Authored-By only (no session; banned by some); a GitHub App/bot per
      agent (heavier, deferred); status quo (origin ambiguous — rejected).
    tags: [provenance, ai-session, issue-129]
    links:
      - type: satisfies
        target: REQ-062
      - type: produced-by
        target: AS-001
